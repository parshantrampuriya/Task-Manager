<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Habits</title>

<link rel="stylesheet" href="css/habits.css">
<link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>

<button onclick="goTasks()">📋 Tasks</button>

<button onclick="goGoals()">🎯 Goals</button>

<button onclick="goHabits()">🔥 Habits</button>

<button onclick="goFriends()">👥 Friends</button>

<button onclick="goQuestionBank()">📚 Question Bank</button>

<button onclick="goTests()">📝 Tests</button>

<button onclick="goGrowth()">🌱 Growth Hub</button>

<button onclick="goProfile()">👤 Profile</button>

<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

<!-- ================= NAVBAR ================= -->

<div class="navbar">

<button
class="menu-btn"
onclick="toggleSidebar()">

☰

</button>

<h2>
🔥 Habit Tracker
</h2>

</div>

<!-- ================= CONTAINER ================= -->

<div class="container">

<!-- ================= STATS ================= -->

<div class="stats-grid">

<div class="stat-card">

<h3 id="totalHabits">
0
</h3>

<p>
Total Habits
</p>

</div>

<div class="stat-card">

<h3 id="completedToday">
0
</h3>

<p>
Completed Today
</p>

</div>

<div class="stat-card">

<h3 id="currentStreak">
0
</h3>

<p>
Current Streak
</p>

</div>

<div class="stat-card">

<h3 id="successRate">
0%
</h3>

<p>
Success Rate
</p>

</div>

</div>

<!-- ================= TOP BAR ================= -->

<div class="top-bar">

<input
type="text"
id="searchInput"
placeholder="🔍 Search habits...">

<button
id="createHabitBtn">

➕ Create Habit

</button>

</div>

<!-- ================= HABIT GRID ================= -->

<div class="habit-table-wrapper">

<table
class="habit-table">

<thead>

<tr>

<th>
Habit
</th>

<th id="day1">
-
</th>

<th id="day2">
-
</th>

<th id="day3">
-
</th>

<th id="day4">
-
</th>

<th id="day5">
-
</th>

<th id="day6">
-
</th>

<th id="day7">
Today
</th>

<th>
Actions
</th>

</tr>

</thead>

<tbody id="habitTableBody">

</tbody>

</table>

</div>

</div>

</div>

<!-- ================= CREATE HABIT MODAL ================= -->

<div
id="habitModal"
class="modal">

<div class="modal-box">

<h3 id="habitModalTitle">

➕ Create Habit

</h3>

<select id="habitType">

<option value="yesno">
Yes / No Habit
</option>

<option value="measurable">
Measurable Habit
</option>

</select>

<input
type="text"
id="habitName"
placeholder="Habit Name">

<textarea
id="habitDescription"
placeholder="Description">

</textarea>

<input
type="color"
id="habitColor"
value="#00cfff">

<!-- ================= MEASURABLE ONLY ================= -->

<div id="measurableFields">

<input
type="text"
id="habitUnit"
placeholder="Unit (Pages, Hours, KM...)">

<input
type="number"
id="habitTarget"
placeholder="Daily Target">

</div>

<div class="modal-actions">

<button
id="saveHabitBtn">

💾 Save

</button>

<button
id="cancelHabitBtn">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- ================= UPDATE ENTRY MODAL ================= -->

<div
id="entryModal"
class="modal">

<div class="modal-box">

<h3 id="entryTitle">

Update Habit

</h3>

<!-- YES NO -->

<div id="yesNoSection">

<button
class="done-btn"
id="doneBtn">

✅ Done

</button>

<button
class="miss-btn"
id="missBtn">

❌ Missed

</button>

</div>

<!-- MEASURABLE -->

<div id="measureSection">

<input
type="number"
id="entryValue"
placeholder="Enter value">

<button
id="saveEntryBtn">

💾 Save Progress

</button>

</div>

<div class="modal-actions">

<button
id="closeEntryBtn">

Close

</button>

</div>

</div>

</div>

<!-- ================= DELETE MODAL ================= -->

<div
id="deleteModal"
class="modal">

<div class="modal-box">

<h3>

Delete Habit?

</h3>

<p>

This action cannot be undone.

</p>

<div class="modal-actions">

<button
id="confirmDeleteBtn">

🗑 Delete

</button>

<button
id="cancelDeleteBtn">

Cancel

</button>

</div>

</div>

</div>

<!-- ================= SCRIPTS ================= -->

<script
type="module"
src="js/menu.js">

</script>

<script
type="module"
src="js/habits.js">

</script>

</body>

</html>
