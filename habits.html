<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habit Tracker</title>

<link rel="stylesheet" href="css/habits.css">
<link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>
<button onclick="goTasks()">📋 Tasks</button>
<button onclick="goGoals()">🎯 Goals</button>
<button onclick="goHabits()">📅 Habits</button>
<button onclick="goFriends()">👥 Friends</button>
<button onclick="goQuestionBank()">📚 Question Bank</button>
<button onclick="goTests()">📝 Tests</button>
<button onclick="goGrowth()">🌱 Growth Hub</button>
<button onclick="goProfile()">👤 Profile</button>

<button id="logoutBtn">
🚪 Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- NAVBAR -->

<div class="navbar">

<button
class="menu-btn"
onclick="toggleSidebar()">

☰

</button>

<h2>
📅 Habit Tracker
</h2>

<button
id="createHabitBtn"
class="create-btn">

➕ Create Habit

</button>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="stat-card">

<h3 id="currentStreak">0</h3>

<p>🔥 Current Streak</p>

</div>

<div class="stat-card">

<h3 id="bestStreak">0</h3>

<p>🏆 Best Streak</p>

</div>

<div class="stat-card">

<h3 id="completionRate">0%</h3>

<p>📊 Completion</p>

</div>

<div class="stat-card">

<h3 id="todayDone">0</h3>

<p>✅ Today</p>

</div>

</div>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="🔍 Search Habits">

</div>

<!-- TABLE -->

<div class="table-wrapper">

<div id="habitTable">

<!-- JS WILL RENDER -->

</div>

</div>

</div>

<!-- ================================================= -->
<!-- CREATE / EDIT HABIT MODAL -->
<!-- ================================================= -->

<div id="habitModal" class="modal">

<div class="modal-box">

<form id="habitForm">

<h2 id="modalTitle">

➕ Create Habit

</h2>

<label>
Habit Type
</label>

<select id="habitType">

<option value="yesno">
Yes / No Habit
</option>

<option value="measurable">
Measurable Habit
</option>

</select>

<!-- TEMPLATE -->

<div id="templateBox">

<label>
Template
</label>

<select id="templateSelect">

<option value="">
Select Template
</option>

<option value="reading">
📚 Reading
</option>

<option value="exercise">
💪 Exercise
</option>

<option value="water">
🚰 Water
</option>

<option value="sleep">
😴 Sleep
</option>

<option value="running">
🏃 Running
</option>

<option value="meditation">
🧘 Meditation
</option>

<option value="study">
📖 Study
</option>

<option value="english">
🗣 English Speaking
</option>

</select>

</div>

<label>
Habit Name
</label>

<input
id="habitName"
type="text"
placeholder="Habit Name">

<label>
Question
</label>

<input
id="habitQuestion"
type="text"
placeholder="Question">

<!-- MEASURABLE -->

<div id="measurableFields">

<label>
Unit
</label>

<input
id="habitUnit"
type="text"
placeholder="Pages / Hours / KM">

<label>
Target
</label>

<input
id="habitTarget"
type="number">

<label>
Target Type
</label>

<select id="targetType">

<option value="atleast">
At Least
</option>

<option value="exactly">
Exactly
</option>

<option value="atmost">
At Most
</option>

</select>

</div>

<label>
Color
</label>

<select id="habitColor">

<option value="#00cfff">
Blue
</option>

<option value="#00ff99">
Green
</option>

<option value="#ff9800">
Orange
</option>

<option value="#ff4d4d">
Red
</option>

<option value="#a855f7">
Purple
</option>

<option value="#ff66cc">
Pink
</option>

</select>

<label>
Notes
</label>

<textarea
id="habitNotes"
rows="4">

</textarea>

<div class="modal-actions">

<button
type="button"
id="saveHabitBtn">

💾 Save

</button>

<button
type="button"
id="cancelHabitBtn">

❌ Cancel

</button>

</div>

</form>

</div>

</div>

<!-- ================================================= -->
<!-- DAILY UPDATE MODAL -->
<!-- ================================================= -->

<div id="updateModal" class="modal">

<div class="modal-box">

<h2 id="updateTitle">

Update Habit

</h2>

<div id="yesNoSection">

<button
id="doneBtn"
type="button">

✅ Done

</button>

<button
id="missedBtn"
type="button">

❌ Missed

</button>

<button
id="skipBtn"
type="button">

⏭ Skip

</button>

</div>

<div id="measureSection">

<label>
Today's Value
</label>

<input
type="number"
id="todayValue">

<div id="todayProgress">

0%

</div>

<button
id="saveProgressBtn"
type="button">

💾 Save Progress

</button>

</div>

<div class="modal-actions">

<button
id="closeUpdateBtn"
type="button">

Close

</button>

</div>

</div>

</div>

<!-- ================================================= -->
<!-- DELETE MODAL -->
<!-- ================================================= -->

<div id="deleteModal" class="modal">

<div class="modal-box">

<h2>
🗑 Delete Habit
</h2>

<p id="deleteHabitName"></p>

<p>
This action cannot be undone.
</p>

<div class="modal-actions">

<button
id="confirmDeleteBtn"
type="button">

Delete

</button>

<button
id="cancelDeleteBtn"
type="button">

Cancel

</button>

</div>

</div>

</div>

<script type="module" src="js/menu.js"></script>
<script type="module" src="js/habits.js"></script>

</body>
</html>
