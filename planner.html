<header>
    <div>
        <h1>🎯 Planner</h1>
        <p>Track and manage your goals</p>
    </div>

    <button id="addGoalBtn">
        <i class="fas fa-plus"></i>
        Create Goal
    </button>
</header>

<div class="stats">
    <div class="stat-card">
        <h3 id="totalGoals">0</h3>
        <p>Total Goals</p>
    </div>

    <div class="stat-card">
        <h3 id="activeGoals">0</h3>
        <p>Active</p>
    </div>

    <div class="stat-card">
        <h3 id="completedGoals">0</h3>
        <p>Completed</p>
    </div>
</div>

<div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search goals...">
</div>

<div id="goalContainer" class="goal-grid"></div>

    <h2>Create Goal</h2>

    <input type="text" id="goalName" placeholder="Goal Name">

    <label>Start Date</label>
    <input type="date" id="startDate">

    <label>End Date</label>
    <input type="date" id="endDate">

    <textarea id="goalDescription" placeholder="Description (Optional)"></textarea>

    <div class="modal-actions">
        <button id="cancelBtn">Cancel</button>
        <button id="saveGoalBtn">Save Goal</button>
    </div>

</div>
