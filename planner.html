<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Planner</title>

<link rel="stylesheet" href="css/planner.css">
<link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>

<button onclick="goTasks()">📋 Tasks</button>

<button onclick="goGoals()">🎯 Goals</button>

<button onclick="goFriends()">👥 Friends</button>

<button onclick="goQuestionBank()">📚 Question Bank</button>

<button onclick="goTests()">📝 Tests</button>

<button onclick="goGrowth()">🌱 Growth Hub</button>

<button onclick="goProfile()">👤 Profile</button>

<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

<!-- ================= NAVBAR ================= -->

<div class="navbar">

<button
class="menu-btn"
onclick="toggleSidebar()">

☰

</button>

<h2 id="username">

🎯 Planner Dashboard

</h2>

</div>

<!-- ================= CONTAINER ================= -->

<div class="container">

<!-- ================= STATS ================= -->

<div class="stats-grid">

<div class="stat-card active-card">

<h3 id="activeGoals">

0

</h3>

<p>

🎯 Active Goals

</p>

</div>

<div class="stat-card completed-card">

<h3 id="completedGoals">

0

</h3>

<p>

✅ Completed Goals

</p>

</div>

<div class="stat-card overdue-card">

<h3 id="overdueGoals">

0

</h3>

<p>

⏰ Overdue Goals

</p>

</div>

<div class="stat-card progress-card">

<h3 id="overallProgress">

0%

</h3>

<p>

📊 Overall Progress

</p>

</div>

</div>

<!-- ================= PROGRESS BOX ================= -->

<div class="planner-progress-box">

<div class="planner-progress-head">

<span>

📈 Goal Progress

</span>

<span id="progressText">

0%

</span>

</div>

<div class="progress-bar">

<div
class="progress-fill"
id="progressFill">

</div>

</div>

</div>

<!-- ================= SEARCH ================= -->

<input
id="searchInput"
placeholder="🔍 Search goals...">

<!-- ================= TOP ACTION ================= -->

<div class="top-actions">

<button
class="create-goal-btn"
id="createGoalBtn">

➕ Create Goal

</button>

</div>

<!-- ================= GOAL CARDS ================= -->

<div
id="goalContainer"
class="goal-grid">

</div>

</div>

</div>

<!-- ================= CREATE GOAL MODAL ================= -->

<div
id="goalModal"
class="modal">

<div class="modal-box">

<h3>

🎯 Create Goal

</h3>

<input
id="goalName"
placeholder="Goal Name">

<input
type="date"
id="startDate">

<input
type="date"
id="endDate">

<textarea
id="goalDescription"
placeholder="Description (Optional)">
</textarea>

<div class="modal-actions">

<button
id="saveGoalBtn">

💾 Save

</button>

<button
id="cancelGoalBtn">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- ================= SCRIPTS ================= -->

<script
type="module"
src="js/menu.js">
</script>

<script
type="module"
src="js/planner.js">
</script>

</body>

</html>
