<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quest</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/quest.css">

</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>
<button onclick="goTasks()">📋 Tasks</button>
<button onclick="goGoals()">🎯 Goals</button>
<button onclick="goFriends()">👥 Friends</button>
<button onclick="goQuestionBank()">📚 Question Bank</button>
<button onclick="goTests()">📝 Tests</button>
<button onclick="goGrowth()">🌱 Growth Hub</button>
<button onclick="goProfile()">👤 Profile</button>
<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<!-- NAVBAR -->
<div class="navbar">
<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<h2 id="pageTitle">❓ Quest</h2>
<button class="small-btn" onclick="goMyPage()">My Page</button>
</div>

<!-- REVIEW -->
<div class="glass-box stats-box">
<div class="stat-card">
<h3 id="totalAdded">0</h3>
<p>This Week Added</p>
</div>

<div class="stat-card">
<h3 id="totalSolved">0</h3>
<p>Solved</p>
</div>

<div class="stat-card">
<h3 id="totalPending">0</h3>
<p>Pending</p>
</div>
</div>

<!-- ADD -->
<div id="addSection" class="glass-box">

<h3>➕ Add Quest</h3>

<input id="questInput" placeholder="Write doubt / topic / thing to learn...">

<input type="date" id="questDate">

<select id="questStatus">
<option value="Pending">Pending</option>
<option value="Searching">Searching</option>
<option value="Asked Someone">Asked Someone</option>
<option value="Learned">Learned</option>
<option value="Closed">Closed</option>
</select>

<button class="main-btn" onclick="addQuest()">Save Quest</button>

</div>

<!-- FRIENDS -->
<div class="glass-box">
<h3>👥 Friends</h3>
<div id="friendListMini">Loading...</div>
</div>

<!-- LIST -->
<div class="glass-box">
<h3>📋 Quest History</h3>
<div id="questList">Loading...</div>
</div>

</div>

<!-- EDIT -->
<div id="editPopup" class="popup-wrap">
<div class="popup-box">

<h3>✏ Edit Quest</h3>

<input id="editText">
<input type="date" id="editDate">

<select id="editStatus">
<option>Pending</option>
<option>Searching</option>
<option>Asked Someone</option>
<option>Learned</option>
<option>Closed</option>
</select>

<div class="popup-actions">
<button class="main-btn" onclick="saveEdit()">Save</button>
<button class="danger-btn" onclick="closeEdit()">Cancel</button>
</div>

</div>
</div>

<!-- DELETE -->
<div id="deletePopup" class="popup-wrap">
<div class="popup-box">

<h3>🗑 Delete Quest?</h3>

<div class="popup-actions">
<button class="danger-btn" onclick="confirmDelete()">Delete</button>
<button class="main-btn" onclick="closeDelete()">Cancel</button>
</div>

</div>
</div>

<div id="toast"></div>

<script type="module" src="js/menu.js"></script>
<script type="module" src="js/quest.js"></script>

</body>
</html>
