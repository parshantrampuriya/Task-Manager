<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Create Test</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/create-test.css?v=5">

</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="location.href='home.html'">🏠 Home</button>
    <button onclick="location.href='question-bank.html'">📚 Question Bank</button>
    <button onclick="location.href='test-dashboard.html'">📝 Test Dashboard</button>
    <button onclick="location.href='friends.html'">👥 Friends</button>
    <button onclick="location.href='profile.html'">👤 Profile</button>

</div>

<!-- PAGE -->
<div class="page">

    <!-- TOP BAR -->
    <div class="top-bar">

        <button class="menu-btn"
        onclick="toggleSidebar()">☰</button>

        <div class="top-title">
            <h1>📝 Create Test</h1>
            <p>Create smart tests for yourself & friends</p>
        </div>

        <button class="back-btn"
        onclick="location.href='test-dashboard.html'">⬅</button>

    </div>

    <!-- CARD -->
    <div class="main-card">

        <!-- TEST DETAILS -->
        <h2 class="section-title">Basic Details</h2>

        <div class="grid-2">

            <div>
                <label>Test Name</label>
                <input id="testName" type="text"
                placeholder="Enter test name">
            </div>

            <div>
                <label>Description</label>
                <input id="testDesc" type="text"
                placeholder="Optional">
            </div>

            <div>
                <label>Duration (Minutes)</label>
                <input id="duration" type="number"
                placeholder="60">
            </div>

            <div>
                <label>Total Marks</label>
                <input id="totalMarks" type="number"
                placeholder="100">
            </div>

            <div>
                <label>Passing Marks</label>
                <input id="passMarks" type="number"
                placeholder="40">
            </div>

        </div>

        <!-- QUESTION MODE -->
        <h2 class="section-title">Question Source</h2>

        <div class="mode-row">

            <button id="bankBtn"
            class="mode-btn active"
            onclick="setMode('bank')">
            📚 Question Bank
            </button>

            <button id="manualBtn"
            class="mode-btn"
            onclick="setMode('manual')">
            ✍ Manual JSON
            </button>

        </div>

        <!-- BANK -->
        <div id="bankArea">

            <div class="grid-2">

                <div>
                    <label>Subject</label>
                    <select id="subjectList">
                        <option value="">
                        Select Subject
                        </option>
                    </select>
                </div>

                <div>
                    <label>Chapter</label>
                    <select id="chapterList">
                        <option value="">
                        All Chapters
                        </option>
                    </select>
                </div>

                <div>
                    <label>No. of Questions</label>
                    <input id="questionCount"
                    type="number"
                    placeholder="20">
                </div>

            </div>

        </div>

        <!-- MANUAL -->
        <div id="manualArea" style="display:none;">

            <label>Paste JSON Questions</label>

            <textarea id="jsonBox"
            placeholder='[{"question":"2+2?","options":["1","2","3","4"],"answer":3}]'></textarea>

        </div>

        <!-- ASSIGN -->
        <h2 class="section-title">Assign Test</h2>

        <div class="assign-box">

            <label class="check-row">
                <input type="checkbox"
                id="selfCheck" checked>
                Myself
            </label>

            <div id="friendList"
            class="friend-list">
            </div>

        </div>

        <!-- SETTINGS -->
        <h2 class="section-title">Settings</h2>

        <div class="settings-grid">

            <label class="check-row">
                <input type="checkbox"
                id="shuffleQ" checked>
                Shuffle Questions
            </label>

            <label class="check-row">
                <input type="checkbox"
                id="shuffleO" checked>
                Shuffle Options
            </label>

            <label class="check-row">
                <input type="checkbox"
                id="instantResult">
                Instant Result
            </label>

            <label class="check-row">
                <input type="checkbox"
                id="releaseLater">
                Release Score Later
            </label>

        </div>

        <!-- BUTTONS -->
        <div class="btn-row">

            <button class="preview-btn"
            onclick="previewTest()">
            👁 Preview
            </button>

            <button class="save-btn"
            onclick="createTest()">
            🚀 Create Test
            </button>

        </div>

        <!-- PREVIEW -->
        <div class="preview-card">

            <h2 class="section-title">Preview</h2>

            <div id="previewBox">
                No Preview Yet
            </div>

        </div>

    </div>

</div>

<div id="toast"></div>

<script type="module"
src="js/create-test.js?v=5"></script>

</body>
</html>
