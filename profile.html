<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="css/profile.css">
</head>

<body>

<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button id="logoutBtn">🚪 Logout</button>

</div>

<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h2>👤 Profile</h2>
    </div>

    <div class="profile-box">

        <h2>My Profile</h2>

        <!-- 🔥 PROFILE IMAGE (UPDATED) -->
        <div class="profile-img-box">

            <img id="profileImg" src="https://via.placeholder.com/120" alt="Profile">

            <input type="file" id="imgInput" accept="image/*">

            <!-- PREVIEW AUTO -->
            <small style="color:#aaa;">Preview will appear instantly</small>

            <button onclick="uploadImage()">Upload Image</button>

        </div>

        <!-- FORM -->
        <label>Name</label>
        <input id="name">

        <label>Email</label>
        <input id="email" disabled>

        <label>Gender</label>
        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Date of Birth</label>
        <input type="date" id="dob">

        <!-- PASSWORD -->
        <label>New Password</label>
        <input type="password" id="password" placeholder="Enter new password">

        <!-- STRENGTH -->
        <div class="strength">
            <div id="strengthBar"></div>
        </div>
        <small id="strengthText"></small>

        <small style="color:#aaa;">Leave blank to keep current password</small>

        <button onclick="togglePassword()">👁 Show / Hide</button>

        <button onclick="resetPassword()">Reset via Email</button>

        <button onclick="saveProfile()">Save Changes</button>

    </div>

</div>

<script type="module" src="js/profile.js"></script>

</body>
</html>
