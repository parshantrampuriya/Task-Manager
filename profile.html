<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="css/profile.css">

<!-- remove favicon error -->
<link rel="icon" href="data:,">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h2>👤 My Profile</h2>
    </div>

    <!-- PROFILE BOX -->
    <div class="profile-box">

        <h2>✨ Profile Settings</h2>

        <!-- NAME -->
        <label>Name</label>
        <input id="name" placeholder="Enter your name">

        <!-- EMAIL -->
        <label>Email</label>
        <input id="email" disabled>

        <!-- GENDER -->
        <label>Gender</label>
        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <!-- DOB -->
        <label>Date of Birth</label>
        <input type="date" id="dob">

        <!-- PASSWORD -->
        <label>New Password</label>
        <input type="password" id="password" placeholder="Enter new password">

        <!-- STRENGTH BAR -->
        <div class="strength">
            <div id="strengthBar"></div>
        </div>
        <small id="strengthText"></small>

        <small class="hint">Leave blank to keep current password</small>

        <!-- BUTTONS -->
        <button onclick="togglePassword()">👁 Show / Hide</button>
        <button onclick="resetPassword()">📩 Reset via Email</button>
        <button onclick="saveProfile()">💾 Save Changes</button>

    </div>

</div>

<!-- ✅ CORRECT PLACE FOR JS -->
<script type="module" src="js/profile.js"></script>

</body>
</html>
