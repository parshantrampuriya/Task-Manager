<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link rel="stylesheet" href="css/home.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚡ Task Manager</h2>

        <button onclick="showPage('home')">🏠 Home</button>
        <button onclick="showPage('tasks')">📋 Tasks</button>
        <button id="logoutBtn">🚪 Logout</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- NAVBAR -->
        <div class="navbar">
            <h2 id="username">👤 Loading...</h2>
        </div>

        <!-- HOME PAGE -->
        <div id="homePage" class="page">
            <div class="content">
                <h1>Welcome to Task Manager 🚀</h1>
                <p>Your productivity dashboard</p>
            </div>
        </div>

        <!-- TASK PAGE -->
        <div id="taskPage" class="page" style="display:none;">

            <!-- SEARCH -->
            <input id="searchInput" placeholder="Search tasks...">

            <!-- TABS -->
            <div class="tabs">
                <button onclick="switchTab('pending')">📌 Pending</button>
                <button onclick="switchTab('due')">🔥 Due</button>
                <button onclick="switchTab('completed')">✅ Completed</button>
            </div>

            <!-- ADD TASK -->
            <div class="add-task">
                <input id="taskInput" placeholder="New task...">
                <input type="date" id="dateInput">
                <button onclick="addTask()">Add</button>
            </div>

            <!-- TASK GRID -->
            <div id="taskContainer" class="task-grid"></div>

        </div>

    </div>

</div>

<script type="module" src="js/home.js"></script>

</body>
</html>
