<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ultimate Dashboard</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/sidebar.css">

<link rel="icon" href="data:,">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>
<button onclick="goTasks()">📋 Tasks</button>
<button onclick="goGoals()">🎯 Goals</button>
<button onclick="goFriends()">👥 Friends</button>
<button onclick="goQuestionBank()">📚 Question Bank</button>
<button onclick="goTests()">📝 Tests</button>
<button onclick="goGrowth()">🌱 Growth Hub</button>
<button onclick="goProfile()">👤 Profile</button>
<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

<!-- TOPBAR -->
<div class="navbar">

<button class="menu-btn"
onclick="toggleSidebar()">☰</button>

<div class="nav-center">
<h2 id="username">👤 Loading...</h2>
<p id="todayDate">Loading...</p>
</div>

<div class="nav-right">

<button class="nav-btn"
onclick="openCustomize()">
⚙ Widgets
</button>

<button class="nav-btn"
onclick="refreshDashboard()">
⟳ Refresh
</button>

</div>

</div>

<!-- HERO -->
<div class="hero-box">

<h1>🚀 Personal Command Center</h1>

<p>
Track tasks, goals, mistakes, insights, doubts and progress from one place.
</p>

</div>

<!-- DASHBOARD GRID -->
<div id="dashboardGrid" class="dashboard-grid">

<!-- JS inject widgets -->

</div>

</div>

<!-- ================= CUSTOMIZE POPUP ================= -->
<div id="customPopup" class="popup-wrap">

<div class="popup-box big-popup">

<div class="popup-head">
<h3>⚙ Customize Dashboard</h3>
<button onclick="closeCustomize()">✖</button>
</div>

<div class="widget-list">

<label><input type="checkbox" data-widget="tasks" checked> 📋 Tasks Widget</label>

<label><input type="checkbox" data-widget="goals" checked> 🎯 Goals Widget</label>

<label><input type="checkbox" data-widget="mistakes" checked> ❌ Mistakes Widget</label>

<label><input type="checkbox" data-widget="insights" checked> 🧠 Insights Widget</label>

<label><input type="checkbox" data-widget="quest" checked> ❓ Quest Widget</label>

<label><input type="checkbox" data-widget="countdown" checked> ⏳ Countdown Widget</label>

</div>

<div class="popup-actions">

<button class="main-btn"
onclick="saveWidgets()">
💾 Save Layout
</button>

<button class="danger-btn"
onclick="closeCustomize()">
Cancel
</button>

</div>

</div>

</div>

<!-- ================= QUICK ADD POPUP ================= -->
<div id="quickPopup" class="popup-wrap">

<div class="popup-box">

<h3 id="popupTitle">Add Item</h3>

<input id="popupText" placeholder="Enter text">

<input type="date" id="popupDate">

<input type="time" id="popupTime">

<select id="popupType">
<option value="task">Task</option>
<option value="mistake">Mistake</option>
<option value="insight">Insight</option>
<option value="quest">Quest</option>
<option value="goal">Goal</option>
</select>

<div class="popup-actions">

<button class="main-btn"
onclick="saveQuickItem()">
Save
</button>

<button class="danger-btn"
onclick="closeQuickPopup()">
Cancel
</button>

</div>

</div>

</div>

<!-- ================= TOAST ================= -->
<div id="toast"></div>

<script type="module" src="js/menu.js"></script>
<script type="module" src="js/home.js"></script>

</body>
</html>
