<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ultimate Dashboard</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/sidebar.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>
<button onclick="goTasks()">📋 Tasks</button>
<button onclick="goGoals()">🎯 Goals</button>
<button onclick="goFriends()">👥 Friends</button>
<button onclick="goQuestionBank()">📚 Question Bank</button>
<button onclick="goTests()">📝 Tests</button>
<button onclick="goGrowth()">🌱 Growth Hub</button>
<button onclick="goProfile()">👤 Profile</button>
<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<!-- NAVBAR -->
<div class="navbar">

<div class="nav-left">
<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<h2 id="username">👤 Welcome</h2>
</div>

<div class="nav-right">
<button class="top-btn" onclick="openCustomize()">⚙ Customize</button>
<button class="top-btn" onclick="openAdd()">➕ Add</button>
</div>

</div>

<!-- DATE + COUNTDOWN -->
<div class="today-bar">

<div class="center-top" id="todayCenter">
<h3>Loading Date...</h3>
<p>Loading...</p>
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard-grid">
<!-- widgets auto load from JS -->
</div>

</div>

<!-- ================= ADD POPUP ================= -->
<div id="addPopup" class="popup-wrap">

<div class="popup-box large-popup">

<div class="popup-head">
<h3>➕ Add New</h3>
<button class="close-x" onclick="closeAdd()">✕</button>
</div>

<div class="type-grid">

<div class="type-card" onclick="selectType('task')">
📋
<span>Task</span>
</div>

<div class="type-card" onclick="selectType('goal')">
🎯
<span>Goal</span>
</div>

<div class="type-card" onclick="selectType('mistake')">
❌
<span>Mistake</span>
</div>

<div class="type-card" onclick="selectType('insight')">
🧠
<span>Insight</span>
</div>

<div class="type-card" onclick="selectType('quest')">
❓
<span>Quest</span>
</div>

<div class="type-card" onclick="selectType('smart')">
🚀
<span>Smart Move</span>
</div>

</div>

<hr style="border-color:rgba(255,255,255,.08);margin:18px 0;">

<div id="addFields">
<div class="small-muted">
Choose what you want to add
</div>
</div>

</div>

</div>

<!-- ================= CUSTOMIZE POPUP ================= -->
<div id="customPopup" class="popup-wrap">

<div class="popup-box large-popup">

<div class="popup-head">
<h3>⚙ Customize Dashboard</h3>
<button class="close-x" onclick="closeCustomize()">✕</button>
</div>

<p class="small-muted">
Choose widgets to show on your dashboard
</p>

<div class="check-grid">

<label>
<input type="checkbox" id="chkFocus" checked>
Today Focus
</label>

<label>
<input type="checkbox" id="chkTasks" checked>
Today Tasks
</label>

<label>
<input type="checkbox" id="chkGoals" checked>
Goals
</label>

<label>
<input type="checkbox" id="chkGrowth" checked>
Growth Summary
</label>

<label>
<input type="checkbox" id="chkCountdown" checked>
Countdown
</label>

<label>
<input type="checkbox" id="chkQuote" checked>
Quote
</label>

</div>

<div class="popup-actions">

<button class="main-btn" onclick="saveCustomize()">
💾 Save Layout
</button>

<button class="danger-btn" onclick="closeCustomize()">
Cancel
</button>

</div>

</div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module" src="js/menu.js"></script>
<script type="module" src="js/home.js"></script>

</body>
</html>
