<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Ultimate Dashboard</title>

<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/home.css">

<link rel="icon" href="data:,">

</head>
<body>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>
<button onclick="goTasks()">📋 Tasks</button>
<button onclick="goGoals()">🎯 Goals</button>
<button onclick="goFriends()">👥 Friends</button>
<button onclick="goQuestionBank()">📚 Question Bank</button>
<button onclick="goTests()">📝 Tests</button>
<button onclick="goGrowth()">🌱 Growth Hub</button>
<button onclick="goProfile()">👤 Profile</button>
<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

<!-- TOP NAV -->
<div class="navbar">

<div class="nav-left">

<button class="menu-btn"
onclick="toggleSidebar()">☰</button>

<h2 id="username">
👤 Welcome...
</h2>

</div>

<div class="nav-right">

<button class="top-btn add-btn"
onclick="openAddPopup()">
➕ Add
</button>

<button class="top-btn"
onclick="openCustomize()">
⚙ Customize
</button>

</div>

</div>

<!-- TODAY BAR -->
<div class="today-bar">

<div>
<h3>📅 Today</h3>
<p id="todayDate">Loading...</p>
</div>

<div class="today-actions">

<button class="mini-btn"
onclick="morningMode()">
🌅 Start Day
</button>

<button class="mini-btn"
onclick="nightReview()">
🌙 Review
</button>

</div>

</div>

<!-- DASHBOARD GRID -->
<div id="dashboardGrid"
class="dashboard-grid">

<!-- JS render -->

</div>

</div>

<!-- ================= GLOBAL ADD POPUP ================= -->
<div id="addPopup"
class="popup-wrap">

<div class="popup-box large-popup">

<div class="popup-head">

<h3 id="popupMainTitle">
➕ Add New
</h3>

<button class="close-x"
onclick="closeAddPopup()">
✕
</button>

</div>

<!-- STEP 1 -->
<div id="typeSelect">

<div class="type-grid">

<div class="type-card"
onclick="selectAddType('task')">
📋
<span>Task</span>
</div>

<div class="type-card"
onclick="selectAddType('goal')">
🎯
<span>Goal</span>
</div>

<div class="type-card"
onclick="selectAddType('mistake')">
❌
<span>Mistake</span>
</div>

<div class="type-card"
onclick="selectAddType('insight')">
🧠
<span>Insight</span>
</div>

<div class="type-card"
onclick="selectAddType('quest')">
❓
<span>Quest</span>
</div>

</div>

</div>

<!-- STEP 2 FORM -->
<div id="dynamicForm"
style="display:none;">

<input id="addText"
placeholder="Write here...">

<input type="date"
id="addDate">

<input type="time"
id="addTime">

<input type="number"
id="addTarget"
placeholder="Target (for goals only)">

<select id="addPriority">
<option value="Normal">Normal</option>
<option value="High">High</option>
<option value="Urgent">Urgent</option>
</select>

<div class="popup-actions">

<button class="main-btn"
onclick="saveGlobalItem()">
💾 Save
</button>

<button class="danger-btn"
onclick="backToTypes()">
⬅ Back
</button>

</div>

</div>

</div>

</div>

<!-- ================= CUSTOMIZE POPUP ================= -->
<div id="customPopup"
class="popup-wrap">

<div class="popup-box large-popup">

<div class="popup-head">

<h3>⚙ Customize Dashboard</h3>

<button class="close-x"
onclick="closeCustomize()">
✕
</button>

</div>

<p class="small-muted">
Select widgets to show on dashboard
</p>

<div class="check-grid">

<label>
<input type="checkbox"
data-widget="focus">
 Today Focus
</label>

<label>
<input type="checkbox"
data-widget="tasks">
 Today Tasks
</label>

<label>
<input type="checkbox"
data-widget="goals">
 Goals
</label>

<label>
<input type="checkbox"
data-widget="mistakes">
 Mistakes
</label>

<label>
<input type="checkbox"
data-widget="insights">
 Insights
</label>

<label>
<input type="checkbox"
data-widget="quest">
 Quest
</label>

<label>
<input type="checkbox"
data-widget="countdown">
 Countdown
</label>

<label>
<input type="checkbox"
data-widget="quote">
 Quote
</label>

</div>

<div class="popup-actions">

<button class="main-btn"
onclick="saveWidgets()">
💾 Save Layout
</button>

<button class="danger-btn"
onclick="closeCustomize()">
Cancel
</button>

</div>

</div>

</div>

<!-- ================= REVIEW POPUP ================= -->
<div id="reviewPopup"
class="popup-wrap">

<div class="popup-box">

<h3>🌙 Night Review</h3>

<input id="reviewDone"
placeholder="What completed today?">

<input id="reviewMistake"
placeholder="Any mistake today?">

<input id="reviewInsight"
placeholder="What learned today?">

<div class="popup-actions">

<button class="main-btn"
onclick="submitReview()">
Submit
</button>

<button class="danger-btn"
onclick="closeReview()">
Close
</button>

</div>

</div>

</div>

<!-- ================= TOAST ================= -->
<div id="toast"></div>

<!-- ================= JS ================= -->
<script type="module"
src="js/menu.js"></script>

<script type="module"
src="js/home.js"></script>

</body>
</html>
