<!-- home.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Home</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/sidebar.css">

</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>
<button onclick="goTasks()">📋 Tasks</button>
<button onclick="goGoals()">🎯 Goals</button>
<button onclick="goFriends()">👥 Friends</button>
<button onclick="goQuestionBank()">📚 Question Bank</button>
<button onclick="goTests()">📝 Tests</button>
<button onclick="goGrowth()">🌱 Growth Hub</button>
<button onclick="goProfile()">👤 Profile</button>
<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="navbar">

<button class="menu-btn"
onclick="toggleSidebar()">☰</button>

<h2 id="username">👤 Loading...</h2>

<button class="custom-btn"
onclick="toggleCustomize()">
⚙ Customize
</button>

</div>

<!-- CUSTOMIZE PANEL -->
<div id="customPanel" class="custom-panel">

<h3>Dashboard Widgets</h3>

<label><input type="checkbox" data-id="tasks" checked> Today Tasks</label>
<label><input type="checkbox" data-id="goals" checked> Goals</label>
<label><input type="checkbox" data-id="quest" checked> Quest</label>
<label><input type="checkbox" data-id="mistakes" checked> Mistakes</label>
<label><input type="checkbox" data-id="insight" checked> Insight</label>
<label><input type="checkbox" data-id="countdown" checked> Countdown</label>

<button onclick="saveLayout()">💾 Save Layout</button>

</div>

<!-- DASHBOARD -->
<div id="dashboardGrid" class="dashboard-grid">

<!-- cards inserted by js -->

</div>

</div>

<script type="module" src="js/home.js"></script>
<script type="module" src="js/menu.js"></script>

</body>
</html>
