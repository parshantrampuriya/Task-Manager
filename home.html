<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link rel="stylesheet" href="css/home.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goGoals()">🎯 Goals</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h2 id="username">👤 Loading...</h2>
    </div>

    <!-- DASHBOARD -->
    <div class="container">

        <div class="dashboard">

            <!-- LEFT PANEL -->
            <div class="left-panel">

                <h2>📅 Today's Tasks</h2>

                <!-- 🔥 COUNTDOWN (NEW) -->
                <div id="countdownBox" style="
                    text-align:center;
                    margin:10px 0 20px 0;
                    padding:10px;
                    border-radius:10px;
                    background:rgba(0,0,0,0.5);
                    box-shadow:0 0 10px rgba(0,255,255,0.2);
                    color:#00cfff;
                    font-weight:bold;
                ">
                    ⏳ Loading countdown...
                </div>

                <!-- QUICK ADD -->
                <div class="quick-add">
                    <input id="quickTaskInput" placeholder="Add new task...">
                    <input type="date" id="quickDateInput">
                    <button onclick="quickAddTask()">➕ Add</button>
                </div>

                <!-- TASK LIST -->
                <div id="homeContent"></div>

            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">

                <h2>🎯 Goals Progress</h2>

                <small style="color:#aaa;">Drag to reorder goals</small>

                <div id="goalsHomeContainer" class="goal-container"></div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="js/home.js"></script>

</body>
</html>
