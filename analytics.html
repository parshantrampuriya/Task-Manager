<!-- analytics.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Analytics</title>
<link rel="stylesheet" href="css/analytics.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="topbar">
    <button onclick="history.back()">← Back</button>
    <h1>📊 My Analytics</h1>
</header>

<section class="summary-grid">

<div class="card glow">
<h3>Total Tests</h3>
<p id="totalTests">0</p>
</div>

<div class="card glow">
<h3>Average Score</h3>
<p id="avgScore">0</p>
</div>

<div class="card glow">
<h3>Highest Score</h3>
<p id="highScore">0</p>
</div>

<div class="card glow">
<h3>Pass Rate</h3>
<p id="passRate">0%</p>
</div>

</section>

<section class="graph-wrap">
<div class="graph-card">
<h2>📈 Score Progress</h2>
<canvas id="scoreChart"></canvas>
</div>

<div class="graph-card">
<h2>📊 Correct / Wrong / Skip</h2>
<canvas id="barChart"></canvas>
</div>
</section>

<section class="insight-grid">

<div class="card">
<h3>🏆 Best Test</h3>
<p id="bestTest">-</p>
</div>

<div class="card">
<h3>📉 Lowest Test</h3>
<p id="lowTest">-</p>
</div>

<div class="card">
<h3>🎯 Accuracy</h3>
<p id="accuracy">0%</p>
</div>

<div class="card">
<h3>🚀 Improvement</h3>
<p id="improve">0%</p>
</div>

</section>

<script type="module" src="js/analytics.js"></script>
</body>
</html>
