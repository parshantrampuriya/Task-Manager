<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mistakes</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/mistakes.css">

</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="location.href='home.html'">🏠 Home</button>
<button onclick="location.href='tasks.html'">📋 Tasks</button>
<button onclick="location.href='goals.html'">🎯 Goals</button>
<button onclick="location.href='friends.html'">👥 Friends</button>
<button onclick="location.href='mistakes.html'">❌ Mistakes</button>
<button onclick="location.href='profile.html'">👤 Profile</button>

</div>

<!-- MAIN -->
<div class="main">

<!-- NAVBAR -->
<div class="navbar">

<button class="menu-btn"
onclick="toggleSidebar()">☰</button>

<h2 id="pageTitle">❌ My Mistakes</h2>

</div>

<!-- TOP -->
<div class="top-row">

<input type="text"
id="mistakeInput"
placeholder="Write your mistake...">

<button onclick="addMistake()">
➕ Add
</button>

</div>

<!-- FRIENDS -->
<div class="friend-box">

<h3>👥 Friends</h3>

<div id="friendListMini">
Loading...
</div>

</div>

<!-- LIST -->
<div id="mistakeList"
class="mistake-list">

Loading...

</div>

</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">

<div class="modal-box">

<h3>Edit Mistake</h3>

<input type="text"
id="editInput">

<div class="modal-actions">

<button onclick="saveEdit()">
Save
</button>

<button onclick="closeEdit()">
Cancel
</button>

</div>

</div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module"
src="js/mistakes.js"></script>

</body>
</html>
