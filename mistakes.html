<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mistakes</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/mistakes.css">

</head>

<body>

<!-- ================= UNIVERSAL SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>

<button onclick="goTasks()">📋 Tasks</button>

<button onclick="goGoals()">🎯 Goals</button>

<button onclick="goFriends()">👥 Friends</button>

<button onclick="goQuestionBank()">📚 Question Bank</button>

<button onclick="goTests()">📝 Tests</button>

<button onclick="goGrowth()">🌱 Growth Hub</button>

<button onclick="goProfile()">👤 Profile</button>

<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN PAGE ================= -->
<div class="main">

<!-- TOP NAVBAR -->
<div class="navbar">

<button class="menu-btn"
onclick="toggleSidebar()">
☰
</button>

<h2 id="pageTitle">❌ My Mistakes</h2>

<button id="myPageBtn"
class="small-btn"
onclick="goMyPage()">
My Page
</button>

</div>

<!-- ================= ADD SECTION ================= -->
<div id="addSection" class="glass-box">

<h3>➕ Add Mistake</h3>

<input
type="text"
id="mistakeInput"
placeholder="Write mistake...">

<input
type="date"
id="mistakeDate">

<button
class="main-btn"
onclick="addMistake()">
Save Mistake
</button>

</div>

<!-- ================= FRIENDS ================= -->
<div class="glass-box">

<h3>👥 Friends</h3>

<div id="friendListMini">
Loading...
</div>

</div>

<!-- ================= MISTAKE HISTORY ================= -->
<div class="glass-box">

<h3>📋 Mistake History</h3>

<div id="mistakeList">
Loading...
</div>

</div>

</div>

<!-- ================= EDIT POPUP ================= -->
<div id="editPopup" class="popup-wrap">

<div class="popup-box">

<h3>✏ Edit Mistake</h3>

<input type="text" id="editText">

<input type="date" id="editDate">

<div class="popup-actions">

<button
class="main-btn"
onclick="saveEdit()">
Save
</button>

<button
class="danger-btn"
onclick="closeEdit()">
Cancel
</button>

</div>

</div>

</div>

<!-- ================= DELETE POPUP ================= -->
<div id="deletePopup" class="popup-wrap">

<div class="popup-box">

<h3>🗑 Delete Mistake?</h3>

<p>This action cannot be undone.</p>

<div class="popup-actions">

<button
class="danger-btn"
onclick="confirmDelete()">
Delete
</button>

<button
class="main-btn"
onclick="closeDelete()">
Cancel
</button>

</div>

</div>

</div>

<!-- ================= TOAST ================= -->
<div id="toast"></div>

<!-- ================= SCRIPTS ================= -->
<script type="module" src="js/menu.js"></script>
<script type="module" src="js/mistakes.js"></script>

</body>
</html>
