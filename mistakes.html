<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mistakes</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/mistakes.css">
</head>

<body>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
<h2>⚡ Menu</h2>

<button onclick="location.href='home.html'">🏠 Home</button>
<button onclick="location.href='tasks.html'">📋 Tasks</button>
<button onclick="location.href='goals.html'">🎯 Goals</button>
<button onclick="location.href='friends.html'">👥 Friends</button>
<button onclick="location.href='mistakes.html'">❌ Mistakes</button>
<button onclick="location.href='profile.html'">👤 Profile</button>
</div>

<!-- Main -->
<div class="main">

<div class="navbar">
<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<h2 id="pageTitle">❌ My Mistakes</h2>
<button id="myPageBtn" class="small-btn" onclick="goMyPage()">My Page</button>
</div>

<!-- Add box -->
<div id="addSection" class="glass-box">

<h3>➕ Add Mistake</h3>

<input type="text" id="mistakeInput" placeholder="Write mistake...">

<input type="date" id="mistakeDate">

<button class="main-btn" onclick="addMistake()">Save Mistake</button>

</div>

<!-- Friends -->
<div class="glass-box">
<h3>👥 Friends</h3>
<div id="friendListMini">Loading...</div>
</div>

<!-- Mistakes -->
<div class="glass-box">
<h3>📋 Mistake History</h3>
<div id="mistakeList">Loading...</div>
</div>

</div>

<!-- Edit Popup -->
<div id="editPopup" class="popup-wrap">

<div class="popup-box">

<h3>✏ Edit Mistake</h3>

<input type="text" id="editText">

<input type="date" id="editDate">

<div class="popup-actions">
<button class="main-btn" onclick="saveEdit()">Save</button>
<button class="danger-btn" onclick="closeEdit()">Cancel</button>
</div>

</div>
</div>

<!-- Delete Popup -->
<div id="deletePopup" class="popup-wrap">

<div class="popup-box">

<h3>🗑 Delete Mistake?</h3>
<p>This action cannot be undone.</p>

<div class="popup-actions">
<button class="danger-btn" onclick="confirmDelete()">Delete</button>
<button class="main-btn" onclick="closeDelete()">Cancel</button>
</div>

</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script type="module" src="js/mistakes.js"></script>
</body>
</html>
