<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>View Questions</title>

<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/view-question.css?v=4">

</head>
<body>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="location.href='home.html'">🏠 Home</button>
    <button onclick="location.href='tasks.html'">📋 Tasks</button>
    <button onclick="location.href='goals.html'">🎯 Goals</button>
    <button onclick="location.href='friends.html'">👥 Friends</button>
    <button onclick="location.href='question-bank.html'">📚 Question Bank</button>
    <button onclick="location.href='create-test.html'">📝 Create Test</button>
    <button onclick="location.href='give-test.html'">🎯 Give Test</button>
    <button onclick="location.href='profile.html'">👤 Profile</button>

</div>

<!-- ================= PAGE ================= -->
<div class="page">

    <!-- TOP BAR -->
    <div class="top-bar">

        <button class="menu-btn"
        onclick="toggleSidebar()">☰</button>

        <div class="top-title">
            <h1 id="pageTitle">📚 View Questions</h1>
            <p id="pageSubTitle">
                Browse Question Bank Like File Manager
            </p>
        </div>

        <button class="page-back-btn"
        onclick="location.href='question-bank.html'">
        ⬅
        </button>

    </div>

    <!-- PATH BAR -->
    <div class="path-bar">

        <button class="folder-back-btn"
        onclick="goFolderBack()">
        ↩ Folder Back
        </button>

        <div id="pathText" class="path-text">
            Home
        </div>

        <button
        id="viewAllBtn"
        class="view-all-btn"
        onclick="viewAllQuestions()"
        style="display:none;">
        👁 Preview All
        </button>

    </div>

    <!-- FILE AREA -->
    <div class="main-card">
        <div id="fileArea"></div>
    </div>

</div>

<!-- ================= MAIN POPUP ================= -->
<div id="popup" class="popup">

    <div class="popup-box">

        <button class="close-btn"
        onclick="closePopup()">✕</button>

        <h2 id="popupQuestion">Title</h2>

        <div id="popupContent"></div>

    </div>

</div>

<!-- ================= CONFIRM POPUP ================= -->
<div id="confirmPopup" class="popup">

    <div class="popup-box">

        <button class="close-btn"
        onclick="closeConfirmPopup()">✕</button>

        <h2 id="confirmTitle">Confirm</h2>

        <div id="confirmText">
            Are you sure?
        </div>

        <div class="popup-btn-row">

            <button class="preview-btn"
            onclick="closeConfirmPopup()">
            Cancel
            </button>

            <button id="confirmYesBtn"
            class="delete-btn">
            Yes Delete
            </button>

        </div>

    </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module"
src="js/view-question.js?v=100"></script>

</body>
</html>
