<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Friends</title>

<link rel="stylesheet" href="css/friends.css?v=6">
<link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>
<button onclick="goTasks()">📋 Tasks</button>
<button onclick="goGoals()">🎯 Goals</button>
<button onclick="goFriends()">👥 Friends</button>
<button onclick="goQuestionBank()">📚 Question Bank</button>
<button onclick="goTests()">📝 Tests</button>
<button onclick="goGrowth()">🌱 Growth Hub</button>
<button onclick="goProfile()">👤 Profile</button>
<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<!-- NAVBAR -->
<div class="navbar">

<button class="menu-btn"
onclick="toggleSidebar()">☰</button>

<h2>👥 Friends Control Center</h2>

</div>

<div class="container">

<!-- SEARCH -->
<div class="box search-box">

<h3>➕ Add Friend</h3>

<input
id="searchUser"
placeholder="Enter friend email...">

<button onclick="sendRequest()">
Send Request
</button>

</div>

<!-- RECEIVED -->
<div class="section-box">

<h3>📩 Received Requests</h3>

<div id="requestList"
class="list-box">
No requests
</div>

</div>

<!-- SENT -->
<div class="section-box">

<h3>📤 Sent Requests</h3>

<div id="sentList"
class="list-box">
No sent
</div>

</div>

<!-- FRIENDS -->
<div class="section-box">

<h3>🤝 Your Friends</h3>

<div id="friendList"
class="list-box">
No friends
</div>

</div>

</div>

</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal"
class="confirm-modal">

<div class="confirm-box">

<h3 id="confirmTitle"></h3>

<p id="confirmText"></p>

<div class="confirm-actions">

<button onclick="confirmYes()">
✔ Yes
</button>

<button onclick="closeConfirm()">
Cancel
</button>

</div>

</div>

</div>

<!-- ACTION POPUP -->
<div id="actionPopup"
class="action-popup"></div>

<!-- TOAST -->
<div id="toast"
class="toast"></div>

<script type="module"
src="js/friends.js"></script>

<script type="module"
src="js/menu.js"></script>

</body>
</html>
