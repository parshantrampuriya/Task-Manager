<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends</title>

<link rel="stylesheet" href="css/friends.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goGoals()">🎯 Goals</button>
    <button onclick="goFriends()">👥 Friends</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button id="logoutBtn">🚪 Logout</button>
</div>

<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h2>👥 Friends</h2>
    </div>

    <div class="container">

        <!-- SEARCH -->
        <div class="box">
            <input id="searchUser" placeholder="Enter email...">
            <button onclick="sendRequest()">➕ Send</button>
        </div>

        <!-- RECEIVED -->
        <h3>📩 Received Requests</h3>
        <div id="requestList"></div>

        <!-- SENT -->
        <h3>📤 Sent Requests</h3>
        <div id="sentList"></div>

        <!-- FRIENDS -->
        <h3>🤝 Your Friends</h3>
        <div id="friendList"></div>

    </div>
</div>

<!-- 🔥 CONFIRM MODAL (REMOVE FRIEND) -->
<div id="confirmModal" class="confirm-modal">
    <div class="confirm-box">
        <h3 id="confirmTitle"></h3>
        <p id="confirmText"></p>

        <div class="confirm-actions">
            <button onclick="confirmYes()">✔ Yes</button>
            <button onclick="closeConfirm()">Cancel</button>
        </div>
    </div>
</div>

<!-- 🔥 ACTION POPUP (ACCEPT / REJECT) -->
<div id="actionPopup" class="action-popup"></div>

<!-- 🔥 TOAST -->
<div id="toast" class="toast"></div>

<script type="module" src="js/friends.js"></script>
<script type="module" src="js/menu.js"></script>

</body>
</html>
