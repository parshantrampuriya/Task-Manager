<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Dashboard</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/view.css"> <!-- optional extra polish -->

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goGoals()">🎯 Goals</button>
    <button onclick="goFriends()">👥 Friends</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>

        <div>
            <h2 id="username">👤 Loading...</h2>
            <small class="view-label">👁 Read-only view</small>
        </div>

        <!-- OPTIONAL BACK BUTTON -->
        <button onclick="history.back()" style="margin-left:auto;">⬅ Back</button>
    </div>

    <!-- DASHBOARD -->
    <div class="container">

        <div class="dashboard">

            <!-- LEFT PANEL -->
            <div class="left-panel">

                <h2>📅 Today's Tasks</h2>

                <!-- TASK LIST -->
                <div id="homeContent">
                    <!-- tasks will load here -->
                </div>

            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">

                <h2>🎯 Goals Progress</h2>

                <div id="goalsHomeContainer" class="goal-container">
                    <!-- goals will load here -->
                </div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="js/view.js"></script>
<script type="module" src="js/menu.js"></script>

</body>
</html>
