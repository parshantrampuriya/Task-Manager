<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Goal Details</title>

<link rel="stylesheet"
href="css/goal-details.css">

<link rel="stylesheet"
href="css/sidebar.css">

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>

<button onclick="goTasks()">📋 Tasks</button>

<button onclick="goGoals()">🎯 Goals</button>

<button onclick="goFriends()">👥 Friends</button>

<button onclick="goQuestionBank()">📚 Question Bank</button>

<button onclick="goTests()">📝 Tests</button>

<button onclick="goGrowth()">🌱 Growth Hub</button>

<button onclick="goProfile()">👤 Profile</button>

<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

<!-- ================= NAVBAR ================= -->

<div class="navbar">

<button
class="menu-btn"
onclick="toggleSidebar()">

☰

</button>

<h2>

🎯 Goal Details

</h2>

</div>

<!-- ================= CONTAINER ================= -->

<div class="container">

<!-- ================= GOAL HEADER ================= -->

<div class="goal-header">

<h1 id="goalTitle">

Loading Goal...

</h1>

<p id="goalDescription">

Goal Description

</p>

</div>

<!-- ================= STATS ================= -->

<div class="stats-grid">

<div class="stat-card">

<h3 id="activeMilestones">

0

</h3>

<p>

🎯 Active

</p>

</div>

<div class="stat-card">

<h3 id="completedMilestones">

0

</h3>

<p>

✅ Completed

</p>

</div>

<div class="stat-card">

<h3 id="overdueMilestones">

0

</h3>

<p>

⏰ Overdue

</p>

</div>

<div class="stat-card">

<h3 id="goalProgress">

0%

</h3>

<p>

📊 Goal Progress

</p>

</div>

</div>

<!-- ================= GOAL PROGRESS ================= -->

<div class="progress-section">

<div class="progress-header">

<span>

📈 Overall Progress

</span>

<span id="progressText">

0%

</span>

</div>

<div class="progress-bar">

<div
class="progress-fill"
id="progressFill">

</div>

</div>

</div>

<!-- ================= ACTIONS ================= -->

<div class="top-actions">

<button
id="createMilestoneBtn"
class="create-btn">

➕ Create Milestone

</button>

</div>

<!-- ================= SEARCH ================= -->

<input
id="searchInput"
placeholder="🔍 Search milestones...">

<!-- ================= MILESTONES ================= -->

<div
id="milestoneContainer"
class="milestone-grid">

</div>

</div>

</div>

<!-- ================= CREATE / EDIT MILESTONE MODAL ================= -->

<div
id="milestoneModal"
class="modal">

<div class="modal-box">

<h3 id="modalTitle">

➕ Create Milestone

</h3>

<input
id="milestoneName"
placeholder="Milestone Name">

<input
type="number"
id="targetValue"
placeholder="Target Value">

<select id="unitType">

<option value="Pages">
Pages
</option>

<option value="Hours">
Hours
</option>

<option value="Days">
Days
</option>

<option value="Tasks">
Tasks
</option>

<option value="Chapters">
Chapters
</option>

<option value="Exercises">
Exercises
</option>

<option value="Custom">
Custom
</option>

</select>

<input
type="date"
id="startDate">

<input
type="date"
id="endDate">

<div class="modal-actions">

<button
id="saveMilestoneBtn">

💾 Save

</button>

<button
id="cancelMilestoneBtn">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- ================= UPDATE PROGRESS MODAL ================= -->

<div
id="progressModal"
class="modal">

<div class="modal-box">

<h3>

➕ Update Progress

</h3>

<p>

Current Progress:
<span id="currentProgressText">
0
</span>

</p>

<input
type="number"
id="progressInput"
placeholder="Add Progress">

<div class="modal-actions">

<button
id="saveProgressBtn">

💾 Update

</button>

<button
id="cancelProgressBtn">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- ================= EDIT PROGRESS MODAL ================= -->

<div
id="editProgressModal"
class="modal">

<div class="modal-box">

<h3>

✏️ Edit Progress

</h3>

<input
type="number"
id="editProgressInput"
placeholder="New Progress">

<div class="modal-actions">

<button
id="saveEditProgressBtn">

💾 Save

</button>

<button
id="cancelEditProgressBtn">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- ================= SCRIPTS ================= -->

<script
type="module"
src="js/menu.js">
</script>

<script
type="module"
src="js/goal-details.js">
</script>

</body>

</html>
