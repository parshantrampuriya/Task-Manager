<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<link rel="stylesheet" href="css/chat.css?v=3">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goGoals()">🎯 Goals</button>
    <button onclick="goFriends()">👥 Friends</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button id="logoutBtn">🚪 Logout</button>
</div>

<!-- 🔥 FIXED NAVBAR -->
<div class="chat-navbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>

    <div class="chat-user">
        <h3 id="chatName">User</h3>
        <span id="status">Offline</span>
    </div>
</div>

<!-- 🔥 CHAT AREA -->
<div id="chatBox" class="chat-box"></div>

<!-- 🔥 INPUT FIXED -->
<div class="chat-input">
    <input id="msgInput" placeholder="Type a message...">
    <button onclick="sendMsg()">➤</button>
</div>

<!-- 🔥 ACTION MODAL (UPDATED - NO PIN) -->
<div id="actionModal" class="action-modal">
  <div class="action-box">
    <h3>Message Options</h3>

    <button onclick="deleteForMe()">🗑 Delete for Me</button>
    <button onclick="deleteForAll()">❌ Delete for Everyone</button>

    <button onclick="closeAction()" class="cancel">Cancel</button>
  </div>
</div>

<script type="module" src="js/chat.js?v=3"></script>
<script type="module" src="js/menu.js"></script>

</body>
</html>
