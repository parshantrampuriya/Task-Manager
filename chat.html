<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<link rel="stylesheet" href="css/chat.css?v=500">
</head>

<body>



<div class="chat-page">

    <!-- TOP BAR -->
    <div class="top-bar">
        <button class="menu-btn" onclick="openmenu()">☰</button>

        <div class="user-info">
            <h3 id="chatName">User</h3>
            <span id="status">Offline</span>
        </div>
    </div>

    <!-- MESSAGE BOX -->
    <div id="chatBox" class="chat-box"></div>

    <!-- INPUT -->
    <div class="chat-input">
        <input id="msgInput" placeholder="Type a message...">
        <button onclick="sendMsg()">➤</button>
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Message Options</h3>
    <button onclick="deleteForMe()">Delete for Me</button>
    <button onclick="deleteForAll()">Delete for Everyone</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script type="module" src="js/chat.js?v=500"></script>
<script type="module" src="js/menu.js"></script>

</body>
</html>
