<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<link rel="stylesheet" href="css/chat.css?v=600">
<link rel="stylesheet" href="css/home.css">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goGoals()">🎯 Goals</button>
    <button onclick="goFriends()">👥 Friends</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button onclick="logout()">🚪 Logout</button>

</div>

<div class="chat-page">

    <!-- ================= TOP BAR ================= -->
    <div class="top-bar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>

        <div class="user-info">
            <h3 id="chatName">User</h3>
            <span id="status">Offline</span>
        </div>
    </div>

    <!-- ================= CHAT BOX ================= -->
    <div id="chatBox" class="chat-box"></div>

    <!-- ================= INPUT AREA ================= -->
    <div class="chat-input">

        <!-- 🔥 REPLY PREVIEW (NEW) -->
        <div id="replyBox" class="reply-box">
            <span id="replyText"></span>
            <button onclick="cancelReply()">✖</button>
        </div>

        <!-- INPUT ROW -->
        <div class="input-row">
            <input id="msgInput" placeholder="Type a message...">
            <button onclick="sendMsg()">➤</button>
        </div>

    </div>

</div>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Message Options</h3>

    <button onclick="deleteForMe()">🗑 Delete for Me</button>
    <button onclick="deleteForAll()">❌ Delete for Everyone</button>
    <button onclick="replyMsg()">↩ Reply</button>

    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script type="module" src="js/chat.js?v=600"></script>
<script type="module" src="js/menu.js"></script>

</body>
</html>
