<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Add Questions</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/add-question.css">

</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <h2>⚡ Menu</h2>

    <button onclick="location.href='home.html'">🏠 Home</button>
    <button onclick="location.href='tasks.html'">📋 Tasks</button>
    <button onclick="location.href='goals.html'">🎯 Goals</button>
    <button onclick="location.href='friends.html'">👥 Friends</button>
    <button onclick="location.href='question-bank.html'">📚 Question Bank</button>
    <button onclick="location.href='profile.html'">👤 Profile</button>
</div>

<!-- PAGE -->
<div class="page">

    <!-- TOP -->
    <div class="top-bar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1>➕ Add Questions</h1>
    </div>

    <!-- CARD -->
    <div class="main-card">

        <!-- MODE -->
        <label>Save Mode</label>
        <select id="modeSelect">
            <option value="new">Create New Folder</option>
            <option value="existing">Save In Existing Folder</option>
        </select>

        <!-- NEW FOLDER AREA -->
        <div id="newArea">

            <label>Subject</label>
            <input id="subject" placeholder="Example: Mechanical">

            <label>Chapter (optional)</label>
            <input id="chapter" placeholder="Example: SOM">

            <label>Topic (optional)</label>
            <input id="topic" placeholder="Example: Stress">

        </div>

        <!-- EXISTING -->
        <div id="existingArea" style="display:none;">

            <label>Select Subject</label>
            <select id="subjectList"></select>

            <label>Select Chapter (optional)</label>
            <select id="chapterList"></select>

            <label>Select Topic (optional)</label>
            <select id="topicList"></select>

        </div>

        <!-- JSON -->
        <label>Paste JSON Questions</label>
        <textarea id="jsonBox" rows="12" placeholder='[
{
"question":"What is force?",
"options":["Joule","Newton","Watt","Pascal"],
"answer":1
}
]'></textarea>

        <!-- BUTTONS -->
        <div class="btn-row">
            <button class="preview-btn" onclick="previewQuestions()">👁 Preview</button>
            <button class="save-btn" onclick="saveQuestions()">💾 Save Questions</button>
        </div>

    </div>

    <!-- PREVIEW -->
    <div class="preview-card">
        <h2>👁 Preview Questions</h2>
        <div id="previewBox">No Preview Yet</div>
    </div>

</div>

<script type="module" src="js/add-question.js"></script>

</body>
</html>
