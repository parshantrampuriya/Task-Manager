<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Add Questions</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/add-question.css?v=5">

<style>
/* 🔥 FIX LAYOUT */
.page{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
}

/* MAIN CENTER CARD */
.main-card{
    width:100%;
    max-width:650px;
}

/* PREVIEW SMALL + CENTER */
.preview-card{
    width:100%;
    max-width:650px;
}

/* OPTIONAL: hide preview until used */
.preview-card{
    display:none;
}

/* SHOW WHEN ACTIVE */
.preview-card.active{
    display:block;
}
</style>

</head>
<body>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">
    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goGoals()">🎯 Goals</button>
    <button onclick="goFriends()">👥 Friends</button>
    <button onclick="goQuestionBank()">📚 Question Bank</button>
    <button onclick="goTests()">📝 Tests</button>
    <button onclick="goGrowth()">🌱 Growth Hub</button>
    <button onclick="goProfile()">👤 Profile</button>

    <button id="logoutBtn">🚪 Logout</button>
</div>

<!-- ================= PAGE ================= -->
<div class="page">

<!-- TOP BAR -->
<div class="top-bar">

    <button class="menu-btn" onclick="toggleSidebar()">☰</button>

    <div class="top-title">
        <h1>➕ Add Questions</h1>
        <p>Store Questions Professionally In Your Question Bank</p>
    </div>

    <!-- 🔥 FIXED BACK BUTTON -->
    <button class="back-btn"
        onclick="history.back()"
        title="Back">
        ⬅
    </button>

</div>

<!-- MAIN CARD -->
<div class="main-card">

    <div class="section-title">📁 Save Location</div>

    <label>Mode</label>
    <select id="modeSelect">
        <option value="new">Create New Folder</option>
        <option value="existing">Use Existing Folder</option>
    </select>

    <div id="newArea">

        <label>Subject *</label>
        <input id="subject" placeholder="Mechanical">

        <label>Chapter</label>
        <input id="chapter" placeholder="Thermodynamics">

        <label>Topic</label>
        <input id="topic" placeholder="Entropy">

    </div>

    <div id="existingArea" style="display:none;">

        <label>Select Subject *</label>
        <select id="subjectList"></select>

        <label>Select Chapter</label>
        <select id="chapterList"></select>

        <div id="newChapterWrap" style="display:none;">
            <label>New Chapter Name</label>
            <input id="newChapterInput">
        </div>

        <label>Select Topic</label>
        <select id="topicList"></select>

        <div id="newTopicWrap" style="display:none;">
            <label>New Topic Name</label>
            <input id="newTopicInput">
        </div>

    </div>

    <div class="section-title">🧠 Questions JSON</div>

    <label>Paste JSON</label>
    <textarea id="jsonBox"></textarea>

    <div class="btn-row">
        <button class="preview-btn" onclick="previewQuestions()">👁 Preview</button>
        <button class="save-btn" onclick="saveQuestions()">💾 Save Questions</button>
    </div>

</div>

<!-- PREVIEW -->
<div class="preview-card" id="previewCard">

    <div class="section-title">👁 Live Preview</div>

    <div id="previewBox">No Preview Yet</div>

</div>

</div>

<div id="toast"></div>

<!-- 🔥 IMPORTANT FIX -->
<script src="js/menu.js"></script>

<!-- YOUR MAIN LOGIC -->
<script type="module" src="js/add-question.js?v=5"></script>

</body>
</html>
