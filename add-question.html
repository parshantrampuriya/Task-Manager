<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Add Questions</title>

<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/add-question.css?v=4">

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goGoals()">🎯 Goals</button>
    <button onclick="goFriends()">👥 Friends</button>
    <button onclick="goQuestionBank()">📚 Question Bank</button>
    <button onclick="goTests()">📝 Tests</button>
    <button onclick="goGrowth()">🌱 Growth Hub</button>
    <button onclick="goProfile()">👤 Profile</button>

    <button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN WRAPPER (IMPORTANT FIX) ================= -->
<div class="main">

    <!-- ================= PAGE ================= -->
    <div class="page">

        <!-- TOP BAR -->
        <div class="top-bar">

            <button class="menu-btn" onclick="toggleSidebar()">☰</button>

            <div class="top-title">
                <h1>➕ Add Questions</h1>
                <p>Store Questions Professionally In Your Question Bank</p>
            </div>

            <!-- 🔥 FIXED BACK BUTTON -->
            <button class="back-btn"
                onclick="history.back()"
                title="Back">
                ⬅
            </button>

        </div>

        <!-- ================= MAIN CARD ================= -->
        <div class="main-card">

            <!-- MODE -->
            <div class="section-title">📁 Save Location</div>

            <label>Mode</label>
            <select id="modeSelect">
                <option value="new">Create New Folder</option>
                <option value="existing">Use Existing Folder</option>
            </select>

            <!-- NEW -->
            <div id="newArea">

                <label>Subject *</label>
                <input id="subject" placeholder="Mechanical">

                <label>Chapter</label>
                <input id="chapter" placeholder="Thermodynamics">

                <label>Topic</label>
                <input id="topic" placeholder="Entropy">

            </div>

            <!-- EXISTING -->
            <div id="existingArea" style="display:none;">

                <label>Select Subject *</label>
                <select id="subjectList"></select>

                <label>Select Chapter</label>
                <select id="chapterList"></select>

                <div id="newChapterWrap" style="display:none;">
                    <label>New Chapter Name</label>
                    <input id="newChapterInput" placeholder="Enter new chapter">
                </div>

                <label>Select Topic</label>
                <select id="topicList"></select>

                <div id="newTopicWrap" style="display:none;">
                    <label>New Topic Name</label>
                    <input id="newTopicInput" placeholder="Enter new topic">
                </div>

            </div>

            <!-- JSON -->
            <div class="section-title">🧠 Questions JSON</div>

            <label>Paste JSON</label>
            <textarea id="jsonBox" placeholder='[
 {
  "question":"Unit of Force?",
  "options":["Joule","Newton","Watt","Pascal"],
  "answer":1
 }
]'></textarea>

            <!-- BUTTON -->
            <div class="btn-row">
                <button class="preview-btn" onclick="previewQuestions()">👁 Preview</button>
                <button class="save-btn" onclick="saveQuestions()">💾 Save Questions</button>
            </div>

        </div>

        <!-- ================= PREVIEW ================= -->
        <div class="preview-card" id="previewCard">

            <div class="section-title">👁 Live Preview</div>

            <div id="previewBox">No Preview Yet</div>

        </div>

    </div>

</div>

<!-- ================= TOAST ================= -->
<div id="toast"></div>

<!-- 🔥 IMPORTANT: MENU JS -->
<script src="js/menu.js"></script>

<!-- MAIN LOGIC -->
<script type="module" src="js/add-question.js?v=4"></script>

</body>
</html>
