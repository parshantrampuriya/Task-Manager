<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Add Questions</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/add-question.css?v=3">

</head>
<body>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">
    <h2>⚡ Menu</h2>

    <button onclick="location.href='home.html'">🏠 Home</button>
    <button onclick="location.href='tasks.html'">📋 Tasks</button>
    <button onclick="location.href='goals.html'">🎯 Goals</button>
    <button onclick="location.href='friends.html'">👥 Friends</button>
    <button onclick="location.href='question-bank.html'">📚 Question Bank</button>
    <button onclick="location.href='create-test.html'">📝 Create Test</button>
    <button onclick="location.href='give-test.html'">🎯 Give Test</button>
    <button onclick="location.href='profile.html'">👤 Profile</button>
</div>

<!-- ================= PAGE ================= -->
<div class="page">

    <!-- TOP BAR -->
  <div class="top-bar">

    <button class="back-btn" onclick="location.href='question-bank.html'">
        ←
    </button>

    <button class="menu-btn" onclick="toggleSidebar()">☰</button>

    <div>
        <h1>➕ Add Questions</h1>
        <p>Store Questions Professionally In Your Question Bank</p>
    </div>

</div>

    <!-- MAIN CARD -->
    <div class="main-card">

        <!-- MODE -->
        <div class="section-title">📁 Save Location</div>

        <label>Mode</label>
        <select id="modeSelect">
            <option value="new">Create New Folder</option>
            <option value="existing">Use Existing Folder</option>
        </select>

        <!-- NEW -->
        <div id="newArea">

            <label>Subject *</label>
            <input id="subject" placeholder="Mechanical">

            <label>Chapter</label>
            <input id="chapter" placeholder="Thermodynamics">

            <label>Topic</label>
            <input id="topic" placeholder="Entropy">

        </div>

        <!-- EXISTING -->
        <div id="existingArea" style="display:none;">

            <label>Select Subject *</label>
            <select id="subjectList"></select>

            <label>Select Chapter</label>
            <select id="chapterList"></select>

            <label>Select Topic</label>
            <select id="topicList"></select>

        </div>

        <!-- JSON -->
        <div class="section-title">🧠 Questions JSON</div>

        <label>Paste JSON</label>
        <textarea id="jsonBox" placeholder='[
 {
  "question":"Unit of Force?",
  "options":["Joule","Newton","Watt","Pascal"],
  "answer":1
 }
]'></textarea>

        <!-- BUTTON -->
        <div class="btn-row">
            <button class="preview-btn" onclick="previewQuestions()">👁 Preview</button>
            <button class="save-btn" onclick="saveQuestions()">💾 Save Questions</button>
        </div>

    </div>

    <!-- PREVIEW -->
    <div class="preview-card">

        <div class="section-title">👁 Live Preview</div>

        <div id="previewBox">No Preview Yet</div>

    </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module" src="js/add-question.js?v=3"></script>

</body>
</html>
