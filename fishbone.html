<!-- FILE NAME: fishbone.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishbone Analysis Diagram</title>
  <link rel="stylesheet" href="fishbone.css">
</head>
<body>

<div class="page">

  <div class="top-section">
    <h1>Fishbone Analysis</h1>

    <div class="problem-input">
      <input type="text" id="problemInput" placeholder="Enter Main Problem">
      <button id="updateBtn">Update Diagram</button>
    </div>
  </div>

  <div class="diagram-container">

    <!-- TOP BONES -->
    <div class="bone bone1 top">
      <div class="card">
        <h3>Man</h3>
        <textarea id="man">Operator error
Lack of training</textarea>
      </div>
    </div>

    <div class="bone bone2 top">
      <div class="card">
        <h3>Machine</h3>
        <textarea id="machine">Burner issue
Sensor failure</textarea>
      </div>
    </div>

    <div class="bone bone3 top">
      <div class="card">
        <h3>Method</h3>
        <textarea id="method">Improper SOP
Wrong sequence</textarea>
      </div>
    </div>

    <!-- MAIN SPINE -->
    <div class="main-line"></div>

    <!-- PROBLEM BOX -->
    <div class="problem-box" id="problemBox">
      Furnace Temperature Variation
    </div>

    <!-- BOTTOM BONES -->
    <div class="bone bone4 bottom">
      <div class="card">
        <h3>Material</h3>
        <textarea id="material">Poor refractory
Low gas quality</textarea>
      </div>
    </div>

    <div class="bone bone5 bottom">
      <div class="card">
        <h3>Measurement</h3>
        <textarea id="measurement">Calibration error
Wrong readings</textarea>
      </div>
    </div>

    <div class="bone bone6 bottom">
      <div class="card">
        <h3>Environment</h3>
        <textarea id="environment">Humidity
Dust</textarea>
      </div>
    </div>

  </div>

</div>

<script src="fishbone.js"></script>

</body>
</html>
