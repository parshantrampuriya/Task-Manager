<!-- FILE NAME: fishbone.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishbone Diagram</title>
  <link rel="stylesheet" href="fishbone.css">
</head>
<body>

<div class="ocean"></div>

<h1>CREATIVE FISHBONE DIAGRAM</h1>

<div class="fish-wrapper">

    <!-- FISH TAIL -->
    <div class="tail"></div>

    <!-- FISH BODY -->
    <div class="fish-body">

        <!-- MAIN SPINE -->
        <div class="spine"></div>

        <!-- TOP BONES -->

        <div class="bone top bone1">
            <div class="content">
                <h3>Materials</h3>
                <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
            </div>
        </div>

        <div class="bone top bone2">
            <div class="content">
                <h3>Methods</h3>
                <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
            </div>
        </div>

        <div class="bone top bone3">
            <div class="content">
                <h3>Machines</h3>
                <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
            </div>
        </div>

        <!-- BOTTOM BONES -->

        <div class="bone bottom bone4">
            <div class="content">
                <h3>Measurement</h3>
                <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
            </div>
        </div>

        <div class="bone bottom bone5">
            <div class="content">
                <h3>Environment</h3>
                <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
            </div>
        </div>

        <div class="bone bottom bone6">
            <div class="content">
                <h3>People</h3>
                <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
            </div>
        </div>

    </div>

    <!-- FISH HEAD -->
    <div class="fish-head">

        <div class="eye"></div>

        <div class="problem-box">
            <textarea id="problemText" placeholder="Problem Statement"></textarea>
        </div>

    </div>

</div>

<script src="fishbone.js"></script>

</body>
</html>
