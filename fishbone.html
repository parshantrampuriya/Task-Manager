<!-- FILE NAME: fishbone.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishbone Analysis</title>
  <link rel="stylesheet" href="fishbone.css">
</head>
<body>

<div class="header">
  <h1>Fishbone Root Cause Analysis</h1>

  <div class="problem-section">
    <input type="text" id="problemInput" placeholder="Enter Main Problem">
    <button onclick="updateProblem()">Update</button>
  </div>
</div>

<div class="fish-container">

  <!-- TOP BONES -->

  <div class="bone top bone1">
    <textarea placeholder="MAN&#10;• Operator error&#10;• No training"></textarea>
  </div>

  <div class="bone top bone2">
    <textarea placeholder="MACHINE&#10;• Sensor failure&#10;• Burner issue"></textarea>
  </div>

  <div class="bone top bone3">
    <textarea placeholder="METHOD&#10;• SOP missing&#10;• Wrong sequence"></textarea>
  </div>

  <!-- BOTTOM BONES -->

  <div class="bone bottom bone4">
    <textarea placeholder="MATERIAL&#10;• Bad refractory&#10;• Poor gas"></textarea>
  </div>

  <div class="bone bottom bone5">
    <textarea placeholder="MEASUREMENT&#10;• Calibration error&#10;• Wrong reading"></textarea>
  </div>

  <div class="bone bottom bone6">
    <textarea placeholder="ENVIRONMENT&#10;• Dust&#10;• Humidity"></textarea>
  </div>

  <!-- FISH BODY -->

  <div class="spine"></div>

  <div class="fish-head">
    <div class="eye"></div>
    <div class="problem-box" id="problemBox">
      Main Problem
    </div>
  </div>

  <!-- TAIL -->

  <div class="tail"></div>

</div>

<script src="fishbone.js"></script>

</body>
</html>
