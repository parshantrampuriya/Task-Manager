<!-- FILE NAME: fishbone.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Fishbone Diagram</title>
  <link rel="stylesheet" href="fishbone.css">
</head>
<body>

<div class="container">

    <h1>CREATIVE FISHBONE DIAGRAM</h1>

    <div class="fish">

        <!-- TAIL -->
        <div class="tail"></div>

        <!-- BODY -->
        <div class="body">

            <!-- TOP BONES -->

            <div class="bone top bone1">
                <div class="box">
                    <h3>Materials</h3>
                    <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
                </div>
            </div>

            <div class="bone top bone2">
                <div class="box">
                    <h3>Methods</h3>
                    <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
                </div>
            </div>

            <div class="bone top bone3">
                <div class="box">
                    <h3>Machines</h3>
                    <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
                </div>
            </div>

            <!-- BOTTOM BONES -->

            <div class="bone bottom bone4">
                <div class="box">
                    <h3>Measurement</h3>
                    <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
                </div>
            </div>

            <div class="bone bottom bone5">
                <div class="box">
                    <h3>Environment</h3>
                    <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
                </div>
            </div>

            <div class="bone bottom bone6">
                <div class="box">
                    <h3>People</h3>
                    <textarea placeholder="Cause 1&#10;Cause 2&#10;Cause 3"></textarea>
                </div>
            </div>

            <!-- SPINE -->
            <div class="spine"></div>

        </div>

        <!-- HEAD -->
        <div class="head">

            <div class="eye"></div>

            <div class="problem">
                <textarea id="problemText" placeholder="Problem Statement"></textarea>
            </div>

        </div>

    </div>

</div>

<script src="fishbone.js"></script>

</body>
</html>
