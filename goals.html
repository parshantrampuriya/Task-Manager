<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals</title>

<link rel="stylesheet" href="css/goals.css">
<link rel="icon" href="data:,">
</head>

<body>

<div class="navbar">
    <button class="menu-btn" onclick="goHome()">🏠</button>
    <h2>🎯 Goals Tracker</h2>
</div>

<div class="container">

    <!-- SET GOAL -->
    <div class="card">
        <h3>Set / Edit Goal</h3>

        <select id="type">
            <option>Pages</option>
            <option>Study Hours</option>
            <option>Custom</option>
        </select>

        <input id="total" type="number" placeholder="Total Target">
        <input id="deadline" type="date">

        <button onclick="saveGoal()">Save Goal</button>
    </div>

    <!-- UPDATE PROGRESS -->
    <div class="card">
        <h3>Update Progress</h3>

        <input id="done" type="number" placeholder="Enter completed value">

        <button onclick="updateProgress()">Update</button>
    </div>

    <!-- RESULT -->
    <div class="card" id="result" style="display:none;">
        <h3>📊 Progress</h3>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

        <p id="percent"></p>
        <p id="remaining"></p>
        <p id="daily"></p>

        <button onclick="resetGoal()">Reset Goal</button>
    </div>

</div>

<script src="js/goals.js"></script>

</body>
</html>
