<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals</title>

<link rel="stylesheet" href="css/goals.css">
<link rel="icon" href="data:,">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button class="menu-btn" onclick="goHome()">🏠</button>
    <h2>🎯 Goals</h2>
</div>

<div class="container">

    <!-- ADD GOAL -->
    <div class="add-box">
        <input id="goalName" placeholder="Goal name (e.g. GATE Study)">
        <input id="goalTotal" type="number" placeholder="Total target">
        <input id="goalDeadline" type="date">
        <button id="addBtn">Add Goal</button>
    </div>

    <!-- GOALS LIST -->
    <div id="goalContainer"></div>

</div>

<!-- ================= MODAL ================= -->

<div id="modal" class="modal">

    <div class="modal-box">

        <h3 id="modalTitle">Edit Goal</h3>

        <!-- NAME -->
        <input id="modalName" placeholder="Goal name">

        <!-- TOTAL / PROGRESS -->
        <input id="modalInput" type="number" placeholder="Value">

        <!-- DEADLINE -->
        <input id="modalDate" type="date">

        <div class="modal-actions">
            <button onclick="saveModal()">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>

    </div>

</div>

<!-- SCRIPT -->
<script src="js/goals.js"></script>

</body>
</html>
