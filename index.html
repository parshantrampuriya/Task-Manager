<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager Ultimate</title>

<link rel="icon" href="data:,">

<style>
body{
margin:0;
font-family:"Segoe Print",cursive;
color:#e6f7ff;
background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
url("mahadev.png") no-repeat center/cover;
}

/* MENU */
.menu-btn{
position:fixed;
top:10px;
right:10px;
background:#ff9f2f;
padding:10px;
cursor:pointer;
display:none;
z-index:10;
}

.menu{
position:fixed;
right:-250px;
top:0;
width:250px;
height:100%;
background:#001f2f;
padding:20px;
transition:0.3s;
z-index:9;
}
.menu.open{right:0;}
.menu div{
margin:10px 0;
cursor:pointer;
}

/* PAGE */
.page{display:none;}
.active{display:block;}

.center{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
}

input,select{
padding:10px;
width:250px;
background:#012;
border:1px solid #00cfff;
color:white;
}

button{
padding:10px;
background:#ff9f2f;
border:none;
cursor:pointer;
}

/* TASK UI */
.filter-bar{
display:flex;
justify-content:center;
gap:10px;
}

.input-row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{background:#012;padding:10px;}

.completed{text-decoration:line-through;opacity:0.6;}

.high{border-left:5px solid red;}
.medium{border-left:5px solid orange;}
.low{border-left:5px solid green;}

.stats{
text-align:center;
background:#012;
padding:10px;
margin:10px;
}
</style>
</head>

<body>

<!-- MENU BUTTON -->
<div id="menuBtn" class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- MENU -->
<div id="menu" class="menu">
<div onclick="goHome()">🏠 Home</div>
<div onclick="showProfile()">👤 Profile</div>
<div onclick="showLeaderboard()">🏆 Leaderboard</div>
<div onclick="showLearning()">📚 Learning</div>
<div onclick="logout()">🚪 Logout</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page active center">
<h2>🔱 Sign In 🔱</h2>
<input id="loginEmail">
<input id="loginPassword" type="password">
<button onclick="login()">Sign In</button>
<p onclick="goSignup()">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="page center">
<input id="name" placeholder="Name">
<input id="email">
<input id="password" type="password">
<button onclick="signup()">Create</button>
<p onclick="goLogin()">Back</p>
</div>

<!-- MAIN APP -->
<div id="appPage" class="page">

<h2 id="userEmail"></h2>

<div id="statsBox" class="stats"></div>

<input id="search" placeholder="Search..." oninput="render(window.allTasks)">
<button onclick="render(window.allTasks)">Search</button>

<div class="filter-bar">
<button onclick="switchFilter('pending')">Pending</button>
<button onclick="switchFilter('completed')">Completed</button>
<button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
<input id="taskInput">

<select id="category">
<option value="Today">Today</option>
<option value="Tomorrow">Tomorrow</option>
<option value="Future">Future</option>
</select>

<input type="date" id="dateInput">

<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button onclick="add()">Add</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- PROFILE -->
<div id="profilePage" class="page center">
<h2>Profile</h2>
<div id="profileData"></div>
<button onclick="goHome()">Back</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderPage" class="page center">
<h2>Leaderboard</h2>
<div id="leaderData"></div>
<button onclick="goHome()">Back</button>
</div>

<!-- LEARNING -->
<div id="learningPage" class="page center">
<h2>Learning Planner</h2>
<input id="subject">
<input id="target">
<button onclick="addLearning()">Add</button>
<div id="learningData"></div>
<button onclick="goHome()">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"task-manager-c32bc.firebaseapp.com",
projectId:"task-manager-c32bc"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;
let allTasks=[];
window.allTasks=[];

let currentFilter="pending";

/* MENU */
window.toggleMenu=()=>menu.classList.toggle("open");

/* PAGE CONTROL */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
menu.classList.remove("open");
}

window.goHome=()=>show("appPage");
window.goSignup=()=>show("signupPage");
window.goLogin=()=>show("loginPage");
window.showProfile=()=>show("profilePage");
window.showLeaderboard=()=>show("leaderPage");
window.showLearning=()=>show("learningPage");

/* AUTH */
onAuthStateChanged(auth,async user=>{
if(user){
currentUser=user;

document.getElementById("menuBtn").style.display="block";

show("appPage");

let userDoc=await getDoc(doc(db,"users",user.uid));
userEmail.innerText="👤 "+(userDoc.data()?.name||user.email);

loadTasks();
loadProfile();
loadLeaderboard();
loadLearning();

}else{
document.getElementById("menuBtn").style.display="none";
show("loginPage");
}
});

/* LOGIN */
window.login=()=>signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);

/* SIGNUP */
window.signup=async()=>{
let u=await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"users",u.user.uid),{name:name.value,email:email.value});
alert("Account created");
show("loginPage");
};

/* LOGOUT */
window.logout=()=>signOut(auth);

/* TASK LOAD */
function loadTasks(){
onSnapshot(collection(db,"tasks"),snap=>{
allTasks=[];
snap.forEach(d=>{
let t=d.data();
if(t.user===currentUser.uid) allTasks.push({id:d.id,...t});
});
window.allTasks=allTasks;
render(allTasks);
});
}

/* ADD */
window.add=async()=>{
let text=taskInput.value;
let date=dateInput.value;
let cat=category.value;
let p=priority.value;

let today=new Date();

if(cat==="Today") date=today.toISOString().split("T")[0];
if(cat==="Tomorrow"){
today.setDate(today.getDate()+1);
date=today.toISOString().split("T")[0];
}

await addDoc(collection(db,"tasks"),{
text,date,priority:p,completed:false,user:currentUser.uid
});

taskInput.value="";
};

/* FILTER */
window.switchFilter=f=>{currentFilter=f;render(allTasks);};

/* RENDER */
window.render=tasks=>{

let today=new Date().toISOString().split("T")[0];

let todayTasks=tasks.filter(t=>t.date===today);
let done=todayTasks.filter(t=>t.completed).length;

statsBox.innerText=`Today ${done}/${todayTasks.length}`;

let search=search.value.toLowerCase();

if(search) tasks=tasks.filter(t=>t.text.toLowerCase().includes(search));

if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

let html="";
tasks.forEach(t=>{
html+=`
<div class="card ${t.priority}">
<div class="${t.completed?'completed':''}">${t.text}</div>
<button onclick="toggle('${t.id}',${t.completed})">✔</button>
</div>`;
});

grid.innerHTML=html;
};

/* TOGGLE */
window.toggle=async(id,c)=>{
await updateDoc(doc(db,"tasks",id),{completed:!c});
};

/* PROFILE */
async function loadProfile(){
let d=await getDoc(doc(db,"users",currentUser.uid));
profileData.innerText=JSON.stringify(d.data(),null,2);
}

/* LEADERBOARD */
async function loadLeaderboard(){
let snap=await getDocs(collection(db,"tasks"));
let count={};
snap.forEach(d=>{
let t=d.data();
if(t.completed) count[t.user]=(count[t.user]||0)+1;
});
leaderData.innerText=JSON.stringify(count,null,2);
}

/* LEARNING */
window.addLearning=async()=>{
await addDoc(collection(db,"learning"),{
user:currentUser.uid,
subject:subject.value,
target:target.value
});
};

async function loadLearning(){
let snap=await getDocs(collection(db,"learning"));
let html="";
snap.forEach(d=>{
let t=d.data();
if(t.user===currentUser.uid){
html+=`<div>${t.subject} - ${t.target}</div>`;
}
});
learningData.innerHTML=html;
}

</script>

</body>
</html>
