<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahadev Task Manager ⚡</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:"Segoe Print",cursive;
color:#e6f7ff;
background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)), url("mahadev.png") no-repeat center center fixed;
background-size:cover;
}

.center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:10px;}

input,select{
padding:10px;width:260px;background:rgba(0,20,40,0.7);border:1px solid #00cfff;color:white;border-radius:6px;
}

button{padding:10px;background:#ff9f2f;border:none;color:white;cursor:pointer;border-radius:6px;}

.error{color:#ff4d4d;font-size:12px;height:14px;}

.topbar{display:flex;justify-content:space-between;padding:15px;font-size:20px;}

.sidebar{position:fixed;right:-260px;top:0;width:250px;height:100%;background:#001f3f;padding:20px;transition:0.3s;}
.sidebar.open{right:0;}
.sidebar button{width:100%;margin:10px 0;}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:20px;}

.card{background:rgba(0,20,40,0.7);padding:10px;border-radius:10px;}

.task{display:flex;justify-content:space-between;}
.completed{text-decoration:line-through;opacity:0.6;}
.high{border-left:5px solid red;}
.medium{border-left:5px solid orange;}
.low{border-left:5px solid green;}

.progress{width:80%;height:10px;background:#333;margin:10px auto;}
.progress-bar{height:100%;background:#00ffcc;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<h2>🔱 Sign In 🔱</h2>
<input id="loginEmail" placeholder="Email">
<div id="loginError" class="error"></div>
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Sign In</button>
<p onclick="showSignup()">Create Account</p>
<p onclick="resetPassword()">Forgot Password</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center" style="display:none">
<h2>Create Account</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<div id="signupError" class="error"></div>
<button onclick="signup()">Create</button>
<p onclick="showLogin()">Back</p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<span onclick="toggleMenu()">☰</span>
<span id="userEmail"></span>
</div>

<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<div style="text-align:center">
<input id="taskInput" placeholder="New Task">
<input type="date" id="taskDate">
<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
<button onclick="addTask()">Add</button>
</div>

<div class="grid" id="grid"></div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<button onclick="logout()">Logout</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser=null;

function showSignup(){loginPage.style.display='none';signupPage.style.display='flex';}
function showLogin(){signupPage.style.display='none';loginPage.style.display='flex';}
function toggleMenu(){sidebar.classList.toggle('open');}

function signup(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
 .then(()=>alert('Account Created'))
 .catch(e=>signupError.innerText=e.message);
}

function login(){
 auth.signInWithEmailAndPassword(loginEmail.value,loginPassword.value)
 .catch(()=>loginError.innerText='Invalid credentials');
}

function logout(){auth.signOut();}

function resetPassword(){
 auth.sendPasswordResetEmail(loginEmail.value)
 .then(()=>alert('Reset email sent'));
}

firebase.auth().onAuthStateChanged(user=>{
 if(user){
 currentUser=user;
 loginPage.style.display='none';
 app.style.display='block';
 userEmail.innerText=user.email;
 loadTasks();
 }else{
 loginPage.style.display='flex';
 app.style.display='none';
 }
});

function addTask(){
 db.collection('tasks').add({
 text:taskInput.value,
 date:taskDate.value,
 priority:priority.value,
 completed:false,
 user:currentUser.uid
 });
 taskInput.value='';
}

function loadTasks(){
 db.collection('tasks').onSnapshot(snap=>{
 let tasks=[];
 snap.forEach(doc=>{
 let t=doc.data();
 if(t.user===currentUser.uid) tasks.push({...t,id:doc.id});
 });
 render(tasks);
 });
}

function render(tasks){
 let html="";
 let done=tasks.filter(t=>t.completed).length;
 let percent=tasks.length?(done/tasks.length)*100:0;
 progressBar.style.width=percent+"%";

 tasks.forEach(t=>{
 html+=`<div class="card ${t.priority}">
 <div class="task ${t.completed?'completed':''}">
 ${t.text}
 <div>
 <button onclick="toggle('${t.id}',${t.completed})">✔</button>
 <button onclick="del('${t.id}')">❌</button>
 </div>
 </div>
 </div>`;
 });
 grid.innerHTML=html;
}

function toggle(id,c){db.collection('tasks').doc(id).update({completed:!c});}
function del(id){db.collection('tasks').doc(id).delete();}

</script>
</body>
</html>
