<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>
body {
    margin: 0;
    font-family: "Segoe Print", cursive;
    color: #e6f7ff;
    background: linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
                url("mahadev.png") no-repeat center center fixed;
    background-size: cover;
}

/* 🔥 SELECT PAGE */
.center-screen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

.select-buttons {
    display: flex;
    gap: 20px;
}

.select-buttons button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 10px;
}

/* TITLE */
h1 {
    text-align: center;
    padding: 15px;
    color: #00cfff;
    text-shadow: 0 0 10px #00cfff, 0 0 10px #ff9f2f;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: center;
    gap: 20px;
    align-items: center;
}

.tab {
    padding: 10px 20px;
    color: #88cfff;
}

.tab.active {
    color: #ff9f2f;
    border-bottom: 2px solid #ff9f2f;
}

.tabs button {
    padding: 6px 12px;
}

/* INPUT */
.input-box {
    display: flex;
    gap: 10px;
    margin: 20px;
}

input, select {
    flex: 1;
    padding: 10px;
    background: rgba(0,20,40,0.7);
    border: 1px solid #00cfff;
    color: white;
    border-radius: 6px;
}

button {
    background: linear-gradient(45deg, #ff9f2f, #e07b12);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
}

@media (max-width: 1000px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .input-box { flex-direction: column; }
}

/* CARD */
.card {
    background: rgba(0,20,40,0.7);
    padding: 15px;
    border-radius: 12px;
}

/* TASK */
.task {
    background: rgba(0,0,0,0.5);
    margin: 8px 0;
    padding: 8px;
    display: flex;
    justify-content: space-between;
    border-radius: 6px;
}

.completed {
    text-decoration: line-through;
    opacity: 0.5;
}
</style>
</head>

<body>

<!-- 🔥 SELECT PAGE -->
<div id="selectPage" class="center-screen">
    <h1>🔱 Choose Your Path 🔱</h1>
    <div class="select-buttons">
        <button onclick="enterApp('Parshant')">Parshant</button>
        <button onclick="enterApp('Tanu')">Tanu</button>
    </div>
</div>

<!-- 🔥 MAIN APP -->
<div id="mainApp" style="display:none;">

<h1>🔱 TASK MANAGER 🔱</h1>

<!-- USER NAME + BACK -->
<div class="tabs">
    <div id="currentUserName" class="tab active"></div>
    <button onclick="goBack()">⬅ Back</button>
</div>

<!-- FILTER -->
<div class="tabs">
    <div class="tab filter active" onclick="switchFilter('pending')">Pending</div>
    <div class="tab filter" onclick="switchFilter('completed')">Completed</div>
    <div class="tab filter" onclick="switchFilter('due')">Due</div>
</div>

<!-- INPUT -->
<div class="input-box">
    <input id="taskInput" placeholder="Enter mission...">
    <select id="category">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="Future">Future</option>
    </select>
    <input type="date" id="date" disabled>
    <button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tasksRef = collection(db, "tasks");

let currentUser = "";
let allTasks = [];
let currentFilter = "pending";

/* ENTER */
window.enterApp = function(user){
    currentUser = user;
    document.getElementById("selectPage").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    document.getElementById("currentUserName").innerText = user;
    render(allTasks);
}

/* BACK */
window.goBack = function(){
    document.getElementById("mainApp").style.display = "none";
    document.getElementById("selectPage").style.display = "flex";
}

/* FILTER */
window.switchFilter = function(filter){
    currentFilter = filter;
    document.querySelectorAll('.filter').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    render(allTasks);
}

/* DATE CONTROL */
document.getElementById("category").addEventListener("change", function(){
    let d=document.getElementById("date");
    if(this.value==="Future") d.disabled=false;
    else {d.disabled=true; d.value="";}
});

/* ADD */
window.add = async function(){
    let t=document.getElementById("taskInput").value;
    let c=document.getElementById("category").value;
    let d=document.getElementById("date").value;

    if(!t) return alert("Enter task");

    let today=new Date();

    if(c==="Today") d=today.toISOString().split("T")[0];
    else if(c==="Tomorrow"){
        today.setDate(today.getDate()+1);
        d=today.toISOString().split("T")[0];
    }
    else if(!d) return alert("Select date");

    await addDoc(tasksRef, {
        text: t,
        date: d,
        completed: false,
        user: currentUser
    });

    document.getElementById("taskInput").value="";
}

/* REALTIME */
onSnapshot(tasksRef, (snapshot)=>{
    allTasks = [];
    snapshot.forEach(docu=>{
        allTasks.push({id: docu.id, ...docu.data()});
    });
    render(allTasks);
});

/* TOGGLE */
window.toggle = async function(id, current){
    await updateDoc(doc(db,"tasks",id), {
        completed: !current
    });
}

/* DELETE */
window.del = async function(id){
    await deleteDoc(doc(db,"tasks",id));
}

/* RENDER */
function render(tasks){
    let today = new Date().toISOString().split("T")[0];

    tasks = tasks.filter(t => t.user === currentUser);

    if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
    else if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
    else if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

    let grouped={};

    tasks.forEach(t=>{
        if(!grouped[t.date]) grouped[t.date]=[];
        grouped[t.date].push(t);
    });

    let html="";
    Object.keys(grouped).sort().forEach(date=>{
        html+=`<div class="card"><h3>${date}</h3>`;
        grouped[date].forEach(task=>{
            html+=`
            <div class="task ${task.completed?'completed':''}">
                ${task.text}
                <div>
                    <button onclick="toggle('${task.id}', ${task.completed})">✔</button>
                    <button onclick="del('${task.id}')">❌</button>
                </div>
            </div>`;
        });
        html+=`</div>`;
    });

    document.getElementById("grid").innerHTML = html;
}

</script>

</body>
</html>
