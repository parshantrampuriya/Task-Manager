<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>
body {
    margin: 0;
    font-family: "Segoe Print", cursive;
    color: #e6f7ff;
    background: linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
                url("mahadev.png") no-repeat center center fixed;
    background-size: cover;
}

.center {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

input, select {
    padding:10px;
    width:250px;
    background: rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

.filter-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.input-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px;
    flex-wrap: wrap;
}

/* GRID FIXED: 3 PER ROW */
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

@media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:500px){
    .grid{grid-template-columns:repeat(1,1fr);}
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
    border-radius:10px;
}

.task {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.completed {
    text-decoration:line-through;
    opacity:0.6;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center" style="display:none">
    <h2>🔱 Sign In 🔱</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Sign In</button>
    <p onclick="goSignup()" style="cursor:pointer;color:#ff9f2f">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center" style="display:none">
    <h2>🔱 Create Account 🔱</h2>
    <input id="name" placeholder="Full Name">
    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>
    <input type="date" id="dob">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
    <p onclick="goLogin()" style="cursor:pointer;color:#ff9f2f">Back to Sign In</p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h2 id="userEmail"></h2>
<button onclick="logout()">Logout</button>

<div class="filter-bar">
    <button onclick="switchFilter('pending')">Pending</button>
    <button onclick="switchFilter('completed')">Completed</button>
    <button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
    <input id="taskInput" placeholder="Enter mission...">

    <select id="category">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="Future">Future</option>
    </select>

    <input type="date" id="date">
    <button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};
const loginPage = document.getElementById("loginPage");
const signupPage = document.getElementById("signupPage");
const appPage = document.getElementById("app");
const userEmail = document.getElementById("userEmail");

const taskInput = document.getElementById("taskInput");
const dateInput = document.getElementById("date");
const category = document.getElementById("category");
const grid = document.getElementById("grid");

const nameInput = document.getElementById("name");
const genderInput = document.getElementById("gender");
const dobInput = document.getElementById("dob");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

const loginEmailInput = document.getElementById("loginEmail");
const loginPasswordInput = document.getElementById("loginPassword");
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let allTasks=[];
let currentFilter="pending";

/* PAGE SWITCH */
window.goSignup=()=>{
    loginPage.style.display="none";
    signupPage.style.display="flex";
}
window.goLogin=()=>{
    signupPage.style.display="none";
    loginPage.style.display="flex";
}

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
    if(user){
        currentUser=user;
        loginPage.style.display="none";
        signupPage.style.display="none";
        app.style.display="block";

        let userDoc=await getDoc(doc(db,"users",user.uid));
        let name=userDoc.data()?.name||user.email;
        userEmail.innerText="👤 "+name;

        loadTasks();
    }else{
        loginPage.style.display="flex";
        app.style.display="none";
    }
});

/* SIGNUP */
window.signup=async()=>{
 let name = nameInput.value;
let gender = genderInput.value;
let dob = dobInput.value;
let email = emailInput.value;
let pass = passwordInput.value;

    let u=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,"users",u.user.uid),{name,gender,dob,email});

    alert("Account Created");
    goLogin();
}

/* LOGIN */
window.login=async()=>{
    await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* LOAD */
function loadTasks(){
    onSnapshot(collection(db,"tasks"),snap=>{
        allTasks=[];
        snap.forEach(d=>{
            let t=d.data();
            if(t.user===currentUser.uid) allTasks.push({id:d.id,...t});
        });
        render(allTasks);
    });
}

/* ADD */
window.add=async()=>{
    let text=taskInput.value;
    let date=dateInput.value;
    let cat=category.value;

    let today=new Date();

    if(cat==="Today") date=today.toISOString().split("T")[0];
    else if(cat==="Tomorrow"){
        today.setDate(today.getDate()+1);
        date=today.toISOString().split("T")[0];
    }

    if(!text||!date) return alert("Fill all");

    await addDoc(collection(db,"tasks"),{
        text,date,completed:false,user:currentUser.uid
    });
}

/* FILTER */
window.switchFilter=(f)=>{currentFilter=f;render(allTasks);}

/* TOGGLE */
window.toggle=(id,c)=>updateDoc(doc(db,"tasks",id),{completed:!c});

/* DELETE */
window.del=(id)=>deleteDoc(doc(db,"tasks",id));

/* 🔥 MAIN RENDER (DATE GROUPING) */
function render(tasks){

    let today=new Date().toISOString().split("T")[0];

    if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
    if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
    if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

    tasks.sort((a,b)=>new Date(a.date)-new Date(b.date));

    let grouped={};

    tasks.forEach(t=>{
        if(!grouped[t.date]) grouped[t.date]=[];
        grouped[t.date].push(t);
    });

    let html="";

    Object.keys(grouped).forEach(date=>{
        let label=getLabel(date);

        html+=`<div class="card"><h3>${label}</h3>`;

        grouped[date].forEach(t=>{
            html+=`
            <div class="task ${t.completed?'completed':''}">
                ${t.text}
                <div>
                    <button onclick="toggle('${t.id}',${t.completed})">✔</button>
                    <button onclick="del('${t.id}')">❌</button>
                </div>
            </div>`;
        });

        html+=`</div>`;
    });

    grid.innerHTML=html;
}

/* LABEL */
function getLabel(date){
    let today=new Date();
    let tomorrow=new Date(); tomorrow.setDate(today.getDate()+1);

    let t=today.toISOString().split("T")[0];
    let tm=tomorrow.toISOString().split("T")[0];

    if(date===t) return "Today";
    if(date===tm) return "Tomorrow";

    return new Date(date).toDateString();
}

</script>

</body>
</html>
