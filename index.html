<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>
body {
    margin: 0;
    font-family: "Segoe Print", cursive;
    color: #e6f7ff;
    background: linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
                url("mahadev.png") no-repeat center center fixed;
    background-size: cover;
}

/* CENTER AUTH */
.center {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

/* INPUT */
input, select {
    padding:10px;
    width:250px;
    background: rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

/* BUTTON */
button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

/* FILTER CENTER */
.filter-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
}

/* INPUT ROW */
.input-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px;
    flex-wrap: wrap;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
}

.task {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.completed {
    text-decoration:line-through;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="center" style="display:none">
    <h2>🔱 Sign In 🔱</h2>

    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">

    <button onclick="login()">Sign In</button>

    <p onclick="goSignup()" style="cursor:pointer;color:#ff9f2f">
        Create Account
    </p>
</div>

<!-- SIGNUP PAGE -->
<div id="signupPage" class="center" style="display:none">
    <h2>🔱 Create Account 🔱</h2>

    <input id="name" placeholder="Full Name">

    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <input type="date" id="dob">

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>

    <p onclick="goLogin()" style="cursor:pointer;color:#ff9f2f">
        Back to Sign In
    </p>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

<h2 id="userEmail"></h2>
<button onclick="logout()">Logout</button>

<div class="filter-bar">
    <button onclick="switchFilter('pending')">Pending</button>
    <button onclick="switchFilter('completed')">Completed</button>
    <button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
    <input id="taskInput" placeholder="Enter mission...">

    <select id="category">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="Future">Future</option>
    </select>

    <input type="date" id="date">

    <button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allTasks = [];
let currentFilter = "pending";

/* PAGE SWITCH */
window.goSignup = ()=>{
    document.getElementById("loginPage").style.display="none";
    document.getElementById("signupPage").style.display="flex";
}

window.goLogin = ()=>{
    document.getElementById("signupPage").style.display="none";
    document.getElementById("loginPage").style.display="flex";
}

/* AUTH STATE */
onAuthStateChanged(auth, async(user)=>{
    if(user){
        currentUser = user;

        document.getElementById("loginPage").style.display="none";
        document.getElementById("signupPage").style.display="none";
        document.getElementById("app").style.display="block";

        let userDoc = await getDoc(doc(db,"users",user.uid));
        let name = userDoc.data()?.name || user.email;

        document.getElementById("userEmail").innerText = "👤 " + name;

        loadTasks();
    } else {
        document.getElementById("loginPage").style.display="flex";
        document.getElementById("app").style.display="none";
    }
});

/* SIGNUP */
window.signup = async ()=>{
    let name = document.getElementById("name").value;
    let gender = document.getElementById("gender").value;
    let dob = document.getElementById("dob").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(!name || !gender || !dob || !email || !pass){
        return alert("Fill all fields");
    }

    let userCred = await createUserWithEmailAndPassword(auth,email,pass);

    await setDoc(doc(db,"users",userCred.user.uid),{
        name, gender, dob, email
    });

    alert("Account created!");
    goLogin();
}

/* LOGIN */
window.login = async ()=>{
    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPassword").value;

    if(!email || !pass) return alert("Enter details");

    await signInWithEmailAndPassword(auth,email,pass);
}

/* LOGOUT */
window.logout = ()=> signOut(auth);

/* LOAD TASKS */
function loadTasks(){
    const ref = collection(db,"tasks");

    onSnapshot(ref,(snap)=>{
        allTasks=[];
        snap.forEach(d=>{
            let t=d.data();
            if(t.user===currentUser.uid){
                allTasks.push({id:d.id,...t});
            }
        });
        render(allTasks);
    });
}

/* ADD TASK */
window.add = async ()=>{
    let text=document.getElementById("taskInput").value;
    let date=document.getElementById("date").value;
    let category=document.getElementById("category").value;

    let today=new Date();

    if(category==="Today"){
        date=today.toISOString().split("T")[0];
    }
    else if(category==="Tomorrow"){
        today.setDate(today.getDate()+1);
        date=today.toISOString().split("T")[0];
    }

    if(!text || !date) return alert("Fill all");

    await addDoc(collection(db,"tasks"),{
        text,
        date,
        completed:false,
        user:currentUser.uid
    });
}

/* FILTER */
window.switchFilter = (f)=>{
    currentFilter=f;
    render(allTasks);
}

/* TOGGLE */
window.toggle = (id,current)=>{
    updateDoc(doc(db,"tasks",id),{completed:!current});
}

/* DELETE */
window.del = (id)=>{
    deleteDoc(doc(db,"tasks",id));
}

/* RENDER */
function render(tasks){
    let today=new Date().toISOString().split("T")[0];

    if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
    if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
    if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

    tasks.sort((a,b)=> new Date(a.date)-new Date(b.date));

    let html="";
    tasks.forEach(t=>{
        html+=`
        <div class="card">
            <div class="task ${t.completed?'completed':''}">
                ${t.text}
                <div>
                    <button onclick="toggle('${t.id}',${t.completed})">✔</button>
                    <button onclick="del('${t.id}')">❌</button>
                </div>
            </div>
        </div>`;
    });

    document.getElementById("grid").innerHTML = html;
}

</script>

</body>
</html>
