<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<link rel="icon" href="data:,">

<style>
body{
margin:0;
font-family:"Segoe Print",cursive;
color:#e6f7ff;
background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
url("mahadev.png") no-repeat center/cover;
}

/* PAGES */
.page{display:none;}
.active{display:flex;}

.center{
height:100vh;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
}

input,select{
padding:10px;
width:250px;
background:#012;
border:1px solid #00cfff;
color:white;
}

button{
padding:10px;
background:#ff9f2f;
border:none;
cursor:pointer;
}

/* MENU */
.menu-btn{
position:fixed;
top:10px;
right:10px;
background:#ff9f2f;
padding:10px;
cursor:pointer;
display:none;
}

.menu{
position:fixed;
right:-250px;
top:0;
width:250px;
height:100%;
background:#001f2f;
padding:20px;
transition:0.3s;
}
.menu.open{right:0;}
.menu div{margin:10px 0;cursor:pointer;}

/* TASK */
.filter-bar{display:flex;justify-content:center;gap:10px;}

.input-row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{background:#012;padding:10px;border-radius:8px;}
.completed{text-decoration:line-through;opacity:0.6;}

.stats{
text-align:center;
background:#012;
padding:10px;
margin:10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menuBtn" class="menu-btn" onclick="toggleMenu()">☰</div>
<div id="menu" class="menu">
<div onclick="goHome()">🏠 Home</div>
<div onclick="logout()">🚪 Logout</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page active center">
<h2>🔱 Sign In 🔱</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Sign In</button>
<p onclick="goSignup()" style="cursor:pointer;color:#ff9f2f">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="page center">
<h2>Create Account</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Create</button>
<p onclick="goLogin()">Back</p>
</div>

<!-- APP -->
<div id="appPage" class="page">

<h2 id="userEmail"></h2>

<div id="statsBox" class="stats"></div>

<input id="search" placeholder="Search..." oninput="render(allTasks)">
<button onclick="render(allTasks)">Search</button>

<div class="filter-bar">
<button onclick="switchFilter('pending')">Pending</button>
<button onclick="switchFilter('completed')">Completed</button>
<button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
<input id="taskInput" placeholder="Task">

<select id="category">
<option value="Today">Today</option>
<option value="Tomorrow">Tomorrow</option>
<option value="Future">Future</option>
</select>

<input type="date" id="dateInput">

<button onclick="add()">Add</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, updateDoc, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR CORRECT CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc",
  storageBucket: "task-manager-c32bc.firebasestorage.app",
  messagingSenderId: "686414095912",
  appId: "1:686414095912:web:158882cd292ccbaaccb71d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* GLOBAL */
let currentUser=null;
let allTasks=[];
let currentFilter="pending";

/* PAGE SWITCH */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* MENU */
window.toggleMenu=()=>menu.classList.toggle("open");

/* NAV */
window.goSignup=()=>show("signupPage");
window.goLogin=()=>show("loginPage");
window.goHome=()=>show("appPage");

/* AUTH STATE */
onAuthStateChanged(auth, async user=>{
if(user){
currentUser=user;
menuBtn.style.display="block";
show("appPage");

let userDoc=await getDoc(doc(db,"users",user.uid));
userEmail.innerText="👤 "+(userDoc.data()?.name || user.email);

loadTasks();

}else{
menuBtn.style.display="none";
show("loginPage");
}
});

/* LOGIN */
window.login = async ()=>{
let email=document.getElementById("loginEmail").value;
let pass=document.getElementById("loginPassword").value;

if(!email||!pass){alert("Enter email & password");return;}

try{
await signInWithEmailAndPassword(auth,email,pass);
}catch(e){alert(e.message);}
}

/* SIGNUP */
window.signup = async ()=>{
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

if(!name||!email||!pass){alert("Fill all");return;}
if(pass.length<6){alert("Password min 6 chars");return;}

try{
let u=await createUserWithEmailAndPassword(auth,email,pass);
await setDoc(doc(db,"users",u.user.uid),{name,email});
alert("Account created");
goLogin();
}catch(e){alert(e.message);}
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* LOAD TASK */
function loadTasks(){
onSnapshot(collection(db,"tasks"),snap=>{
allTasks=[];
snap.forEach(d=>{
let t=d.data();
if(t.user===currentUser.uid){
allTasks.push({id:d.id,...t});
}
});
render(allTasks);
});
}

/* ADD */
window.add=async()=>{
let text=taskInput.value;
let date=dateInput.value;
let cat=category.value;

let today=new Date();

if(cat==="Today") date=today.toISOString().split("T")[0];
if(cat==="Tomorrow"){
today.setDate(today.getDate()+1);
date=today.toISOString().split("T")[0];
}

if(!text||!date){alert("Fill all");return;}

await addDoc(collection(db,"tasks"),{
text,date,completed:false,user:currentUser.uid
});

taskInput.value="";
};

/* FILTER */
window.switchFilter=(f)=>{currentFilter=f;render(allTasks);};

/* TOGGLE */
window.toggle=(id,c)=>updateDoc(doc(db,"tasks",id),{completed:!c});

/* DELETE */
window.del=(id)=>deleteDoc(doc(db,"tasks",id));

/* RENDER */
window.render=(tasks)=>{

let today=new Date().toISOString().split("T")[0];

let todayTasks=tasks.filter(t=>t.date===today);
let done=todayTasks.filter(t=>t.completed).length;
statsBox.innerText=`Today ${done}/${todayTasks.length}`;

let searchVal=document.getElementById("search").value.toLowerCase();
if(searchVal) tasks=tasks.filter(t=>t.text.toLowerCase().includes(searchVal));

if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

let html="";
tasks.forEach(t=>{
html+=`
<div class="card">
<div class="${t.completed?'completed':''}">${t.text}</div>
<button onclick="toggle('${t.id}',${t.completed})">✔</button>
</div>`;
});

grid.innerHTML=html;
};

</script>

</body>
</html>
