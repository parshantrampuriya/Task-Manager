<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let allTasks=[];
let currentFilter="pending";

/* PAGE SWITCH */
window.goSignup=()=>{
    loginPage.style.display="none";
    signupPage.style.display="flex";
}
window.goLogin=()=>{
    signupPage.style.display="none";
    loginPage.style.display="flex";
}

/* PASSWORD STRENGTH */
document.getElementById("password").addEventListener("input",(e)=>{
    let val=e.target.value;
    let bar=document.getElementById("strengthBar");

    if(!bar) return;

    if(val.length<4){bar.style.width="30%";bar.style.background="red";}
    else if(val.length<6){bar.style.width="60%";bar.style.background="orange";}
    else{bar.style.width="100%";bar.style.background="green";}
});

/* AUTH STATE */
onAuthStateChanged(auth, async(user)=>{
    if(user){

        if(!user.emailVerified){
            alert("Please verify your email first");
            signOut(auth);
            return;
        }

        currentUser=user;

        loginPage.style.display="none";
        signupPage.style.display="none";
        app.style.display="block";

        let userDoc=await getDoc(doc(db,"users",user.uid));
        let name=userDoc.data()?.name || user.email;

        document.getElementById("userEmail").innerText="👤 "+name;

        loadTasks();

    }else{
        loginPage.style.display="flex";
        signupPage.style.display="none";
        app.style.display="none";
    }
});

/* SIGNUP */
window.signup=async()=>{
    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let pass=document.getElementById("password").value;
    let gender=document.getElementById("gender").value;
    let dob=document.getElementById("dob").value;

    if(pass.length<6){
        return alert("Password must be at least 6 characters");
    }

    try{
        let userCred=await createUserWithEmailAndPassword(auth,email,pass);

        await sendEmailVerification(userCred.user);

        await setDoc(doc(db,"users",userCred.user.uid),{
            name,gender,dob,email
        });

        alert("Account created! Verify email then login.");
        goLogin();

    }catch(e){
        alert(e.message);
    }
}

/* LOGIN */
window.login=async()=>{
    try{
        await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
    }catch(e){
        alert(e.message);
    }
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* LOAD TASKS (ORIGINAL LOGIC SAME) */
function loadTasks(){
    onSnapshot(collection(db,"tasks"),snap=>{
        allTasks=[];
        snap.forEach(d=>{
            let t=d.data();
            if(t.user===currentUser.uid){
                allTasks.push({id:d.id,...t});
            }
        });
        render(allTasks);
    });
}

/* ADD TASK (ORIGINAL LOGIC RESTORED) */
window.add=async()=>{
    let text=taskInput.value;
    let date=dateInput.value;
    let cat=category.value;

    let today=new Date();

    if(cat==="Today"){
        date=today.toISOString().split("T")[0];
    }
    else if(cat==="Tomorrow"){
        today.setDate(today.getDate()+1);
        date=today.toISOString().split("T")[0];
    }

    if(!text||!date) return alert("Fill all");

    await addDoc(collection(db,"tasks"),{
        text,
        date,
        completed:false,
        user:currentUser.uid
    });

    taskInput.value="";
}

/* FILTER (ORIGINAL) */
window.switchFilter=(f)=>{
    currentFilter=f;
    render(allTasks);
}

/* TOGGLE */
window.toggle=(id,c)=>{
    updateDoc(doc(db,"tasks",id),{completed:!c});
}

/* DELETE */
window.del=(id)=>{
    deleteDoc(doc(db,"tasks",id));
}

/* 🔥 ORIGINAL GROUPING + SORTING RESTORED */
function render(tasks){

    let today=new Date().toISOString().split("T")[0];

    if(currentFilter==="pending"){
        tasks=tasks.filter(t=>!t.completed && t.date>=today);
    }
    else if(currentFilter==="completed"){
        tasks=tasks.filter(t=>t.completed);
    }
    else if(currentFilter==="due"){
        tasks=tasks.filter(t=>!t.completed && t.date<today);
    }

    tasks.sort((a,b)=>new Date(a.date)-new Date(b.date));

    let grouped={};

    tasks.forEach(t=>{
        if(!grouped[t.date]) grouped[t.date]=[];
        grouped[t.date].push(t);
    });

    let html="";

    Object.keys(grouped).forEach(date=>{

        let label=getLabel(date);

        html+=`<div class="card"><h3>${label}</h3>`;

        grouped[date].forEach(t=>{
            html+=`
            <div class="task ${t.completed?'completed':''}">
                ${t.text}
                <div>
                    <button onclick="toggle('${t.id}',${t.completed})">✔</button>
                    <button onclick="del('${t.id}')">❌</button>
                </div>
            </div>`;
        });

        html+=`</div>`;
    });

    grid.innerHTML=html;
}

/* LABEL (ORIGINAL) */
function getLabel(date){
    let today=new Date();
    let tomorrow=new Date();
    tomorrow.setDate(today.getDate()+1);

    let t=today.toISOString().split("T")[0];
    let tm=tomorrow.toISOString().split("T")[0];

    if(date===t) return "Today";
    if(date===tm) return "Tomorrow";

    return new Date(date).toDateString();
}

</script>
