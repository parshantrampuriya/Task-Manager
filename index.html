<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc",
  storageBucket: "task-manager-c32bc.firebasestorage.app",
  messagingSenderId: "686414095912",
  appId: "1:686414095912:web:158882cd292ccbaaccb71d",
  measurementId: "G-TLD8JJGETS"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tasksRef = collection(db, "tasks");

/* 👤 CURRENT USER */
let currentUser = "Parshant";

/* 🔄 SWITCH USER */
window.switchUser = function(user){
    currentUser = user;

    document.querySelectorAll('.user-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(user).classList.add('active');

    render(window.allTasks || []);
}

/* ➕ ADD TASK */
window.add = async function(){
    let t=document.getElementById("taskInput").value;
    let c=document.getElementById("category").value;
    let d=document.getElementById("date").value;

    if(!t) return alert("Enter task");

    let today=new Date();

    if(c==="Today") d=today.toISOString().split("T")[0];
    else if(c==="Tomorrow"){
        today.setDate(today.getDate()+1);
        d=today.toISOString().split("T")[0];
    }
    else if(!d) return alert("Select date");

    await addDoc(tasksRef, {
        text: t,
        date: d,
        completed: false,
        user: currentUser   // 🔥 important
    });

    document.getElementById("taskInput").value="";
}

/* 🔄 REAL TIME */
onSnapshot(tasksRef, (snapshot)=>{
    let tasks = [];

    snapshot.forEach(docu=>{
        tasks.push({id: docu.id, ...docu.data()});
    });

    window.allTasks = tasks;
    render(tasks);
});

/* ✅ TOGGLE */
window.toggle = async function(id, current){
    await updateDoc(doc(db,"tasks",id), {
        completed: !current
    });
}

/* ❌ DELETE */
window.del = async function(id){
    await deleteDoc(doc(db,"tasks",id));
}

/* 🎯 RENDER */
function render(tasks){

    /* 👤 FILTER USER */
    tasks = tasks.filter(t => t.user === currentUser);

    let grouped = {};

    tasks.forEach(t=>{
        if(!grouped[t.date]) grouped[t.date]=[];
        grouped[t.date].push(t);
    });

    let html="";

    for(let date in grouped){

        let pending = grouped[date].filter(t=>!t.completed);
        let completed = grouped[date].filter(t=>t.completed);

        html += `<div class="card"><h3>${formatDateLabel(date)}</h3>`;

        pending.forEach(task=>{
            html += `
            <div class="task">
                <div>${task.text}</div>
                <div>
                    <button onclick="toggle('${task.id}', ${task.completed})">✔</button>
                    <button onclick="del('${task.id}')">❌</button>
                </div>
            </div>`;
        });

        if(pending.length && completed.length){
            html += `<div class="divider"></div>`;
        }

        completed.forEach(task=>{
            html += `
            <div class="task completed">
                <div>${task.text}</div>
                <div>
                    <button onclick="toggle('${task.id}', ${task.completed})">✔</button>
                    <button onclick="del('${task.id}')">❌</button>
                </div>
            </div>`;
        });

        html += `</div>`;
    }

    document.getElementById("grid").innerHTML = html;
}

/* 📅 DATE LABEL */
function formatDateLabel(dateStr){
    let today = new Date();
    let tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);

    let todayStr = today.toISOString().split("T")[0];
    let tomorrowStr = tomorrow.toISOString().split("T")[0];

    if(dateStr === todayStr) return "Today";
    if(dateStr === tomorrowStr) return "Tomorrow";

    return new Date(dateStr).toDateString();
}

</script>
