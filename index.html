<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<link rel="icon" href="data:,">

<style>
body {
    margin:0;
    font-family:"Segoe Print",cursive;
    color:#e6f7ff;
    background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
    url("mahadev.png") no-repeat center center fixed;
    background-size:cover;
}

.center {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

input,select {
    padding:10px;
    width:250px;
    background:rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

/* NEW TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
}

.sidebar{
    position:fixed;
    right:-260px;
    top:0;
    width:250px;
    height:100%;
    background:#001f3f;
    padding:20px;
    transition:0.3s;
}

.sidebar.open{
    right:0;
}

.sidebar button{
    width:100%;
    margin:10px 0;
}

/* EXISTING */
.stats-box {
    text-align:center;
    background:rgba(0,20,40,0.7);
    padding:10px;
    margin:10px auto;
    width:60%;
    border-radius:10px;
}

.congrats {
    color:#00ffcc;
    font-weight:bold;
}

.filter-bar {
    display:flex;
    justify-content:center;
    gap:10px;
}

.input-row {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
    flex-wrap:wrap;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
    border-radius:10px;
}

.task {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.completed {
    text-decoration:line-through;
    opacity:0.6;
}

.high { border-left:5px solid red; }
.medium { border-left:5px solid orange; }
.low { border-left:5px solid green; }

.progress {
    width:80%;
    height:10px;
    background:#333;
    margin:10px auto;
}
.progress-bar {
    height:100%;
    background:#00ffcc;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<h2>🔱 Sign In 🔱</h2>
<input id="loginEmail">
<input id="loginPassword" type="password">
<button onclick="login()">Sign In</button>
<p onclick="goSignup()">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center" style="display:none">
<h2>🔱 Create Account 🔱</h2>
<input id="name">
<select id="gender"><option>Male</option><option>Female</option></select>
<input type="date" id="dob">
<input id="email">
<input id="password" type="password">
<button onclick="signup()">Create Account</button>
<div id="signupMessage"></div>
<p onclick="goLogin()">Back</p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- 🔥 TOP BAR -->
<div class="topbar">
<span onclick="toggleMenu()" style="cursor:pointer;">☰</span>
<span onclick="openProfile()" style="cursor:pointer;">👤</span>
</div>

<h2 id="userEmail"></h2>

<button onclick="logout()">Logout</button>

<div id="statsBox" class="stats-box"></div>

<input id="search" placeholder="Search..." oninput="render(window.allTasks)">
<button onclick="render(window.allTasks)">Search</button>

<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<div class="filter-bar">
<button onclick="switchFilter('pending')">Pending</button>
<button onclick="switchFilter('completed')">Completed</button>
<button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
<input id="taskInput">
<select id="category">
<option value="Today">Today</option>
<option value="Tomorrow">Tomorrow</option>
<option value="Future">Future</option>
</select>
<input type="date" id="dateInput">

<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>

</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<button onclick="closeMenu()">❌ Close</button>
<button onclick="showHome()">🏠 Home</button>
<button onclick="openProfile()">👤 Profile</button>
<button onclick="openLeaderboard()">🏆 Leaderboard</button>
<button onclick="openLearning()">📚 Learning</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<!-- PROFILE -->
<div id="profilePage" class="center" style="display:none">
<h2>👤 Profile</h2>
<p id="pName"></p>
<p id="pGender"></p>
<p id="pDob"></p>
<p id="pEmail"></p>
<button onclick="showHome()">🏠 Home</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardPage" class="center" style="display:none">
<h2>🏆 Leaderboard</h2>
<input id="inviteEmail" placeholder="Invite email">
<button onclick="inviteFriend()">Invite</button>
<div id="leaderboardList"></div>
<button onclick="showHome()">🏠 Home</button>
</div>

<!-- LEARNING -->
<div id="learningPage" class="center" style="display:none">
<h2>📚 Learning Planner</h2>
<input id="subjectInput">
<input id="targetInput">
<button onclick="addLearning()">Add</button>
<div id="learningList"></div>
<button onclick="showHome()">🏠 Home</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

let currentUser=null;
let allTasks=[];
window.allTasks = [];
let currentFilter="pending";

/* 🔒 COOLDOWN SYSTEM */
let lastAttempt = 0;
function canProceed(){
    let now = Date.now();
    if(now - lastAttempt < 2000){
        alert("⏳ Please wait 2 seconds before retrying");
        return false;
    }
    lastAttempt = now;
    return true;
}

/* AUTH STATE */
onAuthStateChanged(auth, async(user)=>{
    if(user){
        currentUser=user;
        loginPage.style.display="none";
        signupPage.style.display="none";
        app.style.display="block";

        let userDoc=await getDoc(doc(db,"users",user.uid));
        userEmail.innerText="👤 "+(userDoc.data()?.name||user.email);

        loadTasks();
    }else{
        loginPage.style.display="flex";
        app.style.display="none";
    }
});

/* VALIDATION */
function validateEmail(email){
    return email.includes("@") && email.includes(".");
}

/* SIGNUP */
window.signup=async()=>{
    try{
        if(!email.value || !password.value){
            alert("⚠ Fill all fields");
            return;
        }

        if(!validateEmail(email.value)){
            alert("❌ Invalid Email");
            return;
        }

        if(password.value.length < 6){
            alert("❌ Password must be 6+ characters");
            return;
        }

        if(!canProceed()) return;

        let user=await createUserWithEmailAndPassword(auth,email.value,password.value);

        await setDoc(doc(db,"users",user.user.uid),{
            name:name.value,
            gender:gender.value,
            dob:dob.value,
            email:email.value
        });

        signupMessage.innerText="✅ Account Created";
    }
    catch(e){
        alert("❌ "+e.message);
    }
}

/* LOGIN */
window.login=async()=>{
    try{
        if(!loginEmail.value || !loginPassword.value){
            alert("⚠ Enter email & password");
            return;
        }

        if(!canProceed()) return;

        await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
    }
    catch(e){
        if(e.code==="auth/too-many-requests"){
            alert("🚫 Too many attempts. Wait 30-60 seconds");
        }
        else if(e.code==="auth/invalid-credential"){
            alert("❌ Wrong email or password");
        }
        else{
            alert("❌ "+e.message);
        }
    }
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* LOAD TASKS */
function loadTasks(){
    onSnapshot(collection(db,"tasks"),snap=>{
        allTasks=[];
        snap.forEach(d=>{
            let t=d.data();
            if(t.user===currentUser.uid){
                allTasks.push({id:d.id,...t});
            }
        });
        window.allTasks = allTasks;
        render(allTasks);
    });
}

/* ADD TASK */
window.add=async()=>{
    if(!taskInput.value){
        alert("⚠ Enter task");
        return;
    }

    await addDoc(collection(db,"tasks"),{
        text:taskInput.value,
        date:dateInput.value,
        completed:false,
        user:currentUser.uid,
        priority:priority.value
    });

    taskInput.value="";
}

/* FILTER */
window.switchFilter=(f)=>{currentFilter=f;render(allTasks);}

/* TOGGLE */
window.toggle=(id,c)=>updateDoc(doc(db,"tasks",id),{completed:!c});

/* DELETE */
window.del=(id)=>deleteDoc(doc(db,"tasks",id));

/* RENDER */
window.render=function(tasks){

    let today=new Date().toISOString().split("T")[0];

    let todayTasks = tasks.filter(t => t.date === today);
    let done = todayTasks.filter(t => t.completed).length;
    let total = todayTasks.length;

    let statsHTML = `Today Progress: ${done} / ${total}`;

    if(total > 0 && done === total){
        statsHTML += `<div class="congrats">🎉 All tasks completed!</div>`;
    }

    statsBox.innerHTML = statsHTML;

    if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed);
    if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);

    let html="";
    tasks.forEach(t=>{
        html+=`
        <div class="card ${t.priority}">
        <div class="task ${t.completed?'completed':''}">
        ${t.text}
        <div>
        <button onclick="toggle('${t.id}',${t.completed})">✔</button>
        <button onclick="del('${t.id}')">❌</button>
        </div>
        </div>
        <small>${t.date}</small>
        </div>`;
    });

    grid.innerHTML=html;
}

</script>
</body>
</html>
