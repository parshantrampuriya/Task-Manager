<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>
body {
    margin: 0;
    font-family: "Segoe Print", cursive;
    color: #e6f7ff;
    background: linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
                url("mahadev.png") no-repeat center center fixed;
    background-size: cover;
}

/* AUTH PAGE */
.center {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

input {
    padding:10px;
    width:250px;
    background: rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
}

.task {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.completed {
    text-decoration:line-through;
}
</style>
</head>

<body>

<!-- 🔐 AUTH PAGE -->
<div id="authPage" class="center">
    <h2>🔱 Sign In / Sign Up 🔱</h2>

    <input id="name" placeholder="Full Name (for signup only)">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Sign In</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

<h2 id="userEmail"></h2>
<button onclick="logout()">Logout</button>

<div>
    <button onclick="switchFilter('pending')">Pending</button>
    <button onclick="switchFilter('completed')">Completed</button>
    <button onclick="switchFilter('due')">Due</button>
</div>

<input id="taskInput" placeholder="Task">
<input type="date" id="date">
<button onclick="add()">Add</button>

<div class="grid" id="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allTasks = [];
let currentFilter = "pending";

/* SIGNUP */
window.signup = async ()=>{
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(!name || !email || !pass){
        alert("Fill all fields");
        return;
    }

    try{
        let userCred = await createUserWithEmailAndPassword(auth, email, pass);

        await setDoc(doc(db, "users", userCred.user.uid), {
            name: name,
            email: email
        });

        alert("✅ Account created! Now login");
    }catch(err){
        alert(err.message);
    }
};

/* LOGIN */
window.login = async ()=>{
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(!email || !pass){
        alert("Enter email & password");
        return;
    }

    try{
        await signInWithEmailAndPassword(auth, email, pass);
    }catch(err){
        alert(err.message);
    }
};

/* LOGOUT */
window.logout = async ()=>{
    await signOut(auth);
};

/* AUTH STATE (VERY IMPORTANT) */
onAuthStateChanged(auth, async(user)=>{
    if(user){
        currentUser = user;

        document.getElementById("authPage").style.display="none";
        document.getElementById("app").style.display="block";

        let userDoc = await getDoc(doc(db, "users", user.uid));
        let name = userDoc.data()?.name || user.email;

        document.getElementById("userEmail").innerText = "👤 " + name;

        loadTasks();
    } else {
        document.getElementById("authPage").style.display="flex";
        document.getElementById("app").style.display="none";
    }
});

/* LOAD TASKS */
function loadTasks(){
    onSnapshot(collection(db,"tasks"), (snap)=>{
        allTasks=[];
        snap.forEach(d=>{
            let t=d.data();
            if(t.user===currentUser.uid){
                allTasks.push({id:d.id,...t});
            }
        });
        render(allTasks);
    });
}

/* ADD */
window.add = async ()=>{
    let text=document.getElementById("taskInput").value;
    let date=document.getElementById("date").value;

    if(!text || !date){
        alert("Fill all");
        return;
    }

    await addDoc(collection(db,"tasks"),{
        text,
        date,
        completed:false,
        user:currentUser.uid
    });

    document.getElementById("taskInput").value="";
};

/* FILTER */
window.switchFilter = function(f){
    currentFilter=f;
    render(allTasks);
};

/* TOGGLE */
window.toggle = async (id,current)=>{
    await updateDoc(doc(db,"tasks",id),{completed:!current});
};

/* DELETE */
window.del = async (id)=>{
    await deleteDoc(doc(db,"tasks",id));
};

/* RENDER */
function render(tasks){
    let today=new Date().toISOString().split("T")[0];

    if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
    if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
    if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

    let html="";
    tasks.forEach(t=>{
        html+=`
        <div class="card">
            <div class="task ${t.completed?'completed':''}">
                ${t.text}
                <div>
                    <button onclick="toggle('${t.id}',${t.completed})">✔</button>
                    <button onclick="del('${t.id}')">❌</button>
                </div>
            </div>
        </div>`;
    });

    document.getElementById("grid").innerHTML = html;
}

</script>
</body>
</html>
