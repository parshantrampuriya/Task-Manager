<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<link rel="icon" href="data:,">

<style>
body {
    margin:0;
    font-family:"Segoe Print",cursive;
    color:#e6f7ff;
    background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
    url("mahadev.png") no-repeat center center fixed;
    background-size:cover;
}

.center {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

input,select {
    padding:10px;
    width:250px;
    background:rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

.error{color:#ff4d4d;font-size:12px;}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
}

.sidebar{
    position:fixed;
    right:-260px;
    top:0;
    width:250px;
    height:100%;
    background:#001f3f;
    padding:20px;
    transition:0.3s;
}
.sidebar.open{right:0;}
.sidebar button{width:100%;margin:10px 0;}

.stats-box {
    text-align:center;
    background:rgba(0,20,40,0.7);
    padding:10px;
    margin:10px auto;
    width:60%;
    border-radius:10px;
}

.filter-bar {display:flex;justify-content:center;gap:10px;}

.input-row {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
    flex-wrap:wrap;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
    border-radius:10px;
    cursor:grab;
}

.task {display:flex;justify-content:space-between;}

.completed {text-decoration:line-through;opacity:0.6;}

.high { border-left:5px solid red; }
.medium { border-left:5px solid orange; }
.low { border-left:5px solid green; }

.progress {width:80%;height:10px;background:#333;margin:10px auto;}
.progress-bar {height:100%;background:#00ffcc;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<h2>🔱 Sign In 🔱</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p onclick="goSignup()">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center" style="display:none">
<h2>Create Account</h2>
<input id="name" placeholder="Name">
<select id="gender"><option>Male</option><option>Female</option></select>
<input type="date" id="dob">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Create</button>
<p onclick="goLogin()">Back</p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<span onclick="toggleMenu()">☰</span>
<span onclick="openProfile()">👤</span>
<button onclick="toggleView()">📅</button>
</div>

<h2 id="userEmail"></h2>

<div id="statsBox" class="stats-box"></div>

<input id="search" placeholder="Search..." oninput="render(window.allTasks)">
<button onclick="render(window.allTasks)">Search</button>

<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<div class="filter-bar">
<button onclick="switchFilter('pending')">Pending</button>
<button onclick="switchFilter('completed')">Completed</button>
<button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
<input id="taskInput">
<select id="category">
<option value="Today">Today</option>
<option value="Tomorrow">Tomorrow</option>
<option value="Future">Future</option>
</select>
<input type="date" id="dateInput">

<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>

</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<button onclick="showHome()">Home</button>
<button onclick="openProfile()">Profile</button>
<button onclick="openLeaderboard()">Leaderboard</button>
<button onclick="logout()">Logout</button>
</div>

<!-- PROFILE -->
<div id="profilePage" class="center" style="display:none">
<h2>Profile</h2>
<p id="pName"></p>
<p id="pEmail"></p>
<button onclick="showHome()">Home</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardPage" class="center" style="display:none">
<h2>Leaderboard</h2>
<input id="friendEmail" placeholder="Add Friend Email">
<button onclick="addFriend()">Add Friend</button>
<div id="leaderboardList"></div>
<button onclick="showHome()">Home</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
authDomain:"task-manager-c32bc.firebaseapp.com",
projectId:"task-manager-c32bc"
};

const appFirebase=initializeApp(firebaseConfig);
const auth=getAuth(appFirebase);
const db=getFirestore(appFirebase);

let currentUser=null;
let allTasks=[];
window.allTasks=[];
let currentFilter="pending";
let calendarView=false;

/* NAV */
function hideAll(){
app.style.display="none";
profilePage.style.display="none";
leaderboardPage.style.display="none";
}

window.showHome=()=>{hideAll();app.style.display="block";}

window.openProfile=async()=>{
hideAll();profilePage.style.display="flex";
let u=await getDoc(doc(db,"users",currentUser.uid));
pName.innerText="Name: "+u.data().name;
pEmail.innerText="Email: "+u.data().email;
}

window.openLeaderboard=()=>{hideAll();leaderboardPage.style.display="flex";loadLeaderboard();}

/* MENU */
window.toggleMenu=()=>sidebar.classList.toggle("open");

/* AUTH */
window.goSignup=()=>{loginPage.style.display="none";signupPage.style.display="flex";}
window.goLogin=()=>{signupPage.style.display="none";loginPage.style.display="flex";}

window.signup=async()=>{
let u=await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"users",u.user.uid),{
name:name.value,email:email.value
});
}

window.login=()=>signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,user=>{
if(user){
currentUser=user;
loginPage.style.display="none";
app.style.display="block";
loadTasks();
}
});

/* TASKS */
function loadTasks(){
onSnapshot(collection(db,"tasks"),snap=>{
allTasks=[];
snap.forEach(d=>{
let t=d.data();
if(t.user===currentUser.uid){
allTasks.push({id:d.id,...t});
}
});
updateScore();
render(allTasks);
});
}

window.add=async()=>{
let today=new Date();
let d=dateInput.value;
if(category.value==="Today") d=today.toISOString().split("T")[0];
if(category.value==="Tomorrow"){today.setDate(today.getDate()+1);d=today.toISOString().split("T")[0];}

await addDoc(collection(db,"tasks"),{
text:taskInput.value,date:d,completed:false,user:currentUser.uid,priority:priority.value
});
taskInput.value="";
}

window.toggle=(id,c)=>updateDoc(doc(db,"tasks",id),{completed:!c});
window.del=(id)=>deleteDoc(doc(db,"tasks",id));

/* SCORE */
function updateScore(){
let score=allTasks.filter(t=>t.completed).length;
setDoc(doc(db,"scores",currentUser.uid),{score:score});
}

/* LEADERBOARD */
function loadLeaderboard(){
onSnapshot(collection(db,"scores"),snap=>{
let html="";
snap.forEach(d=>{
html+=`<p>${d.id} : ${d.data().score}</p>`;
});
leaderboardList.innerHTML=html;
});
}

/* FRIEND */
window.addFriend=async()=>{
await addDoc(collection(db,"friends"),{
from:currentUser.uid,to:friendEmail.value
});
}

/* VIEW */
window.toggleView=()=>{calendarView=!calendarView;render(allTasks);}

/* RENDER */
window.render=function(tasks){

let grouped={};
tasks.forEach(t=>{
if(!grouped[t.date]) grouped[t.date]=[];
grouped[t.date].push(t);
});

let dates=Object.keys(grouped).sort((a,b)=>new Date(a)-new Date(b));

let html="";
dates.forEach(date=>{
html+=`<div style="grid-column:1/-1;color:#00ffcc;">📅 ${date}</div>`;

grouped[date].sort((a,b)=>{
let p={"high":1,"medium":2,"low":3};
return p[a.priority]-p[b.priority];
});

grouped[date].forEach(t=>{
html+=`
<div class="card ${t.priority}">
<div class="task ${t.completed?'completed':''}">
${t.text}
<div>
<button onclick="toggle('${t.id}',${t.completed})">✔</button>
<button onclick="del('${t.id}')">❌</button>
</div>
</div>
</div>`;
});
});

grid.innerHTML=html;
}

</script>

</body>
</html>
