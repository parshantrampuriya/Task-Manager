<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>
body {
    margin: 0;
    font-family: "Segoe Print", cursive;
    color: #e6f7ff;
    background: linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
                url("mahadev.png") no-repeat center center fixed;
    background-size: cover;
}

/* AUTH PAGE */
.center {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

input {
    padding:10px;
    width:250px;
    background: rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
}

.task {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.completed {
    text-decoration:line-through;
}
    /* ✅ PASTE BELOW THIS */
.filter-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.input-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 20px;
    flex-wrap: wrap;
}

.input-row input,
.input-row select {
    padding: 10px;
    min-width: 150px;
}
</style>
</head>

<body>

<!-- 🔐 AUTH PAGE -->
<!-- LOGIN PAGE -->
<div id="loginPage" class="center">

    <h2>🔱 Sign In 🔱</h2>

    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">

    <button onclick="login()">Sign In</button>

    <p style="cursor:pointer;color:#ff9f2f" onclick="goSignup()">
        Create Account
    </p>

</div>

<!-- SIGNUP PAGE -->
<div id="signupPage" class="center" style="display:none">

    <h2>🔱 Create Account 🔱</h2>

    <input id="name" placeholder="Full Name">

    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <input type="date" id="dob">

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>

    <p style="cursor:pointer;color:#ff9f2f" onclick="goLogin()">
        Back to Sign In
    </p>

</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

<h2 id="userEmail"></h2>
<button onclick="logout()">Logout</button>

<div class="filter-bar">
    <button onclick="switchFilter('pending')">Pending</button>
    <button onclick="switchFilter('completed')">Completed</button>
    <button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
    <input id="taskInput" placeholder="Enter mission...">

    <select id="category">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="Future">Future</option>
    </select>

    <input type="date" id="date">

    <button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allTasks = [];
let currentFilter = "pending";

/* SIGNUP */
window.signup = async ()=>{
    let name = document.getElementById("name").value;
    let gender = document.getElementById("gender").value;
    let dob = document.getElementById("dob").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(!name || !email || !pass){
        alert("Fill all fields");
        return;
    }

    try{
        let userCred = await createUserWithEmailAndPassword(auth, email, pass);

        await setDoc(doc(db,"users",userCred.user.uid),{
            name, gender, dob, email
        });

        alert("✅ Account created successfully!");

        goLogin(); // go back to login page
    }catch(err){
        alert(err.message);
    }
}

/* LOGIN */
window.login = async ()=>{
    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPassword").value;

    if(!email || !pass){
        alert("Enter email & password");
        return;
    }

    try{
        await signInWithEmailAndPassword(auth, email, pass);
    }catch(err){
        alert(err.message);
    }
}

/* LOGOUT */
window.logout = async ()=>{
    await signOut(auth);
};

/* AUTH STATE (VERY IMPORTANT) */
onAuthStateChanged(auth, async(user)=>{
    if(user){
        currentUser = user;

        // ✅ hide both auth pages
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("signupPage").style.display = "none";

        // ✅ show app
        document.getElementById("app").style.display = "block";

        let userDoc = await getDoc(doc(db, "users", user.uid));
        let name = userDoc.data()?.name || user.email;

        document.getElementById("userEmail").innerText = "👤 " + name;

        loadTasks();

    } else {

        // ✅ show login page only
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("signupPage").style.display = "none";

        document.getElementById("app").style.display = "none";
    }
});
/* LOAD TASKS */
function loadTasks(){
    onSnapshot(collection(db,"tasks"), (snap)=>{
        allTasks=[];
        snap.forEach(d=>{
            let t=d.data();
            if(t.user===currentUser.uid){
                allTasks.push({id:d.id,...t});
            }
        });
        render(allTasks);
    });
}

/* ADD */
window.add = async ()=>{
    let text = document.getElementById("taskInput").value;
let category = document.getElementById("category").value;
let dateInput = document.getElementById("date").value;

let today = new Date();
let date;

if(category === "Today"){
    date = today.toISOString().split("T")[0];
}
else if(category === "Tomorrow"){
    today.setDate(today.getDate() + 1);
    date = today.toISOString().split("T")[0];
}
else{
    if(!dateInput){
        alert("Select date");
        return;
    }
    date = dateInput;
}
    document.getElementById("category").addEventListener("change", function(){
    let d = document.getElementById("date");

    if(this.value === "Future"){
        d.disabled = false;
    } else {
        d.disabled = true;
        d.value = "";
    }
});

    if(!text || !date){
        alert("Fill all");
        return;
    }

    await addDoc(collection(db,"tasks"),{
        text,
        date,
        completed:false,
        user:currentUser.uid
    });

    document.getElementById("taskInput").value="";
};

/* FILTER */
window.switchFilter = function(f){
    currentFilter=f;
    render(allTasks);
};

/* TOGGLE */
window.toggle = async (id,current)=>{
    await updateDoc(doc(db,"tasks",id),{completed:!current});
};

/* DELETE */
window.del = async (id)=>{
    await deleteDoc(doc(db,"tasks",id));
};

/* RENDER */
function render(tasks){

    let today = new Date().toISOString().split("T")[0];

    // FILTER (keep your existing feature)
    if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
    if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
    if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

    // GROUP BY DATE
    let grouped = {};
    tasks.forEach(t=>{
        if(!grouped[t.date]) grouped[t.date]=[];
        grouped[t.date].push(t);
    });

    // SORT DATES
    let dates = Object.keys(grouped).sort((a,b)=> new Date(a)-new Date(b));

    let html="";

    dates.forEach(date=>{

        let label = formatDate(date);
        let day = new Date(date).toLocaleDateString('en-US',{weekday:'long'});

        html += `
        <div class="card">
            <h3>${label}</h3>
            <small>${day}</small>
        `;

        grouped[date].forEach(task=>{
            html += `
            <div class="task ${task.completed?'completed':''}">
                ${task.text}
                <div>
                    <button onclick="toggle('${task.id}',${task.completed})">✔</button>
                    <button onclick="del('${task.id}')">❌</button>
                </div>
            </div>`;
        });

        html += `</div>`;
    });

    document.getElementById("grid").innerHTML = html;
}
    function formatDate(dateStr){

    let today = new Date();
    let tomorrow = new Date();
    tomorrow.setDate(today.getDate()+1);

    let t = today.toISOString().split("T")[0];
    let tm = tomorrow.toISOString().split("T")[0];

    let d = new Date(dateStr);

    if(dateStr === t) return "Today";
    if(dateStr === tm) return "Tomorrow";

    return d.toDateString();
}
    window.signup = async ()=>{
    let name = document.getElementById("name").value;
    let gender = document.getElementById("gender").value;
    let dob = document.getElementById("dob").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(!name || !email || !pass){
        alert("Fill all fields");
        return;
    }

    try{
        let userCred = await createUserWithEmailAndPassword(auth, email, pass);

        await setDoc(doc(db,"users",userCred.user.uid),{
            name, gender, dob, email
        });

        alert("✅ Account created successfully!");

        goLogin(); // go back to login page
    }catch(err){
        alert(err.message);
    }
}

</script>
</body>
</html>
