<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Task Manager</title>

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
.hidden {display:none;}
.container {max-width:400px;margin:60px auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);} 
input, button {width:100%;padding:10px;margin:8px 0;border-radius:5px;border:1px solid #ccc;}
button {background:#007bff;color:white;border:none;cursor:pointer;}
.error {color:red;font-size:14px;}
.navbar {background:#007bff;color:white;padding:10px;display:flex;justify-content:space-between;}
.menu {cursor:pointer;font-size:20px;}
.sidebar {position:fixed;top:0;right:-200px;width:200px;height:100%;background:#333;color:white;padding:20px;transition:0.3s;}
.sidebar a {display:block;color:white;margin:10px 0;text-decoration:none;}
.task {background:white;margin:10px;padding:10px;border-radius:5px;}
</style>
</head>
<body>

<div class="navbar hidden" id="navbar">
<span>Task Manager</span>
<span class="menu" onclick="toggleMenu()">☰</span>
</div>

<div class="sidebar" id="sidebar">
<a href="#" onclick="showPage('profile')">Profile</a>
<a href="#" onclick="showPage('home')">Home</a>
<a href="#">Leaderboard</a>
<a href="#">Learning</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<div class="error" id="loginError"></div>
<button onclick="login()">Sign In</button>
<p onclick="showPage('forgot')" style="cursor:pointer;color:blue">Forgot Password?</p>
<p onclick="showPage('register')" style="cursor:pointer;color:blue">Create Account</p>
</div>

<!-- REGISTER -->
<div class="container hidden" id="registerPage">
<h2>Create Account</h2>
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<div class="error" id="registerError"></div>
<button onclick="register()">Create Account</button>
<p onclick="showPage('login')" style="cursor:pointer;color:blue">Back to Login</p>
</div>

<!-- FORGOT -->
<div class="container hidden" id="forgotPage">
<h2>Reset Password</h2>
<input type="email" id="forgotEmail" placeholder="Enter Email">
<button onclick="resetPassword()">Reset</button>
<p onclick="showPage('login')">Back</p>
</div>

<!-- PROFILE -->
<div class="container hidden" id="profilePage">
<h2>Your Tasks</h2>
<input type="text" id="taskInput" placeholder="New Task">
<input type="date" id="taskDate">
<button onclick="addTask()">Add Task</button>

<select onchange="sortTasks(this.value)">
<option value="date">Sort by Date</option>
<option value="name">Sort by Name</option>
</select>

<div id="taskList"></div>
</div>

<script>
let currentUser = null;

function showPage(page) {
 document.querySelectorAll('.container').forEach(e=>e.classList.add('hidden'));
 if(page==='login') loginPage.classList.remove('hidden');
 if(page==='register') registerPage.classList.remove('hidden');
 if(page==='forgot') forgotPage.classList.remove('hidden');
 if(page==='profile') profilePage.classList.remove('hidden');
}

function toggleMenu(){
 let sidebar=document.getElementById('sidebar');
 sidebar.style.right = sidebar.style.right==='0px' ? '-200px':'0px';
}

function register(){
 let users = JSON.parse(localStorage.getItem('users'))||[];
 let email=document.getElementById('email').value;
 let password=document.getElementById('password').value;
 if(users.find(u=>u.email===email)){
 document.getElementById('registerError').innerText='Email already exists';return;
 }
 users.push({email,password,tasks:[]});
 localStorage.setItem('users',JSON.stringify(users));
 alert('Account Created');
 showPage('login');
}

function login(){
 let users=JSON.parse(localStorage.getItem('users'))||[];
 let email=loginEmail.value;
 let password=loginPassword.value;
 let user=users.find(u=>u.email===email && u.password===password);
 if(!user){
 document.getElementById('loginError').innerText='Invalid credentials';return;
 }
 currentUser=email;
 navbar.classList.remove('hidden');
 showPage('profile');
 loadTasks();
}

function logout(){
 currentUser=null;
 navbar.classList.add('hidden');
 showPage('login');
}

function resetPassword(){
 alert('Password reset link (simulated)');
}

function addTask(){
 let users=JSON.parse(localStorage.getItem('users'));
 let user=users.find(u=>u.email===currentUser);
 user.tasks.push({
 name:taskInput.value,
 date:taskDate.value
 });
 localStorage.setItem('users',JSON.stringify(users));
 loadTasks();
}

function loadTasks(){
 let users=JSON.parse(localStorage.getItem('users'));
 let user=users.find(u=>u.email===currentUser);
 let list=document.getElementById('taskList');
 list.innerHTML='';
 user.tasks.forEach(t=>{
 list.innerHTML+=`<div class='task'>${t.name} - ${t.date}</div>`;
 });
}

function sortTasks(type){
 let users=JSON.parse(localStorage.getItem('users'));
 let user=users.find(u=>u.email===currentUser);
 if(type==='date') user.tasks.sort((a,b)=>new Date(a.date)-new Date(b.date));
 if(type==='name') user.tasks.sort((a,b)=>a.name.localeCompare(b.name));
 localStorage.setItem('users',JSON.stringify(users));
 loadTasks();
}
</script>

</body>
</html>
