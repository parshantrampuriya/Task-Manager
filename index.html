<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager Pro</title>

<style>
body {
    margin:0;
    font-family:"Segoe Print",cursive;
    color:#e6f7ff;
    background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
    url("mahadev.png") no-repeat center center fixed;
    background-size:cover;
}

.center {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

input,select {
    padding:10px;
    width:260px;
    background:rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

.error {color:#ff4d4d;font-size:12px;}
.success {color:#4dff88;font-size:12px;}

.strength {height:5px;width:260px;background:#222;}
.strength-bar {height:100%;width:0%;}

/* APP */
.filter-bar {display:flex;justify-content:center;gap:10px;}
.input-row {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
    flex-wrap:wrap;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
    border-radius:10px;
}

.task {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.completed {text-decoration:line-through;opacity:0.6;}

.high {color:red;}
.medium {color:orange;}
.low {color:lightgreen;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center" style="display:none">
    <h2>🔱 Sign In 🔱</h2>

    <input id="loginEmail" placeholder="Email">
    <div id="loginEmailError" class="error"></div>

    <input id="loginPassword" type="password" placeholder="Password">
    <div id="loginPassError" class="error"></div>

    <button onclick="login()">Sign In</button>

    <p onclick="goSignup()" style="cursor:pointer;color:#ff9f2f">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center" style="display:none">
    <h2>🔱 Create Account 🔱</h2>

    <input id="name" placeholder="Full Name">
    <div id="nameError" class="error"></div>

    <select id="gender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <input type="date" id="dob">

    <input id="email" placeholder="Email">
    <div id="emailError" class="error"></div>

    <input id="password" type="password" placeholder="Password">
    <div class="strength"><div id="strengthBar" class="strength-bar"></div></div>
    <div id="passError" class="error"></div>

    <button onclick="signup()">Create Account</button>
    <div id="signupSuccess" class="success"></div>

    <p onclick="goLogin()" style="cursor:pointer;color:#ff9f2f">Back to Sign In</p>
</div>

<!-- APP -->
<div id="app" style="display:none">
<h2 id="userEmail"></h2>
<button onclick="logout()">Logout</button>

<div class="filter-bar">
    <button onclick="switchFilter('pending')">Pending</button>
    <button onclick="switchFilter('completed')">Completed</button>
    <button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
    <input id="taskInput" placeholder="Enter mission...">

    <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <input type="date" id="date">
    <button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let allTasks=[];
let currentFilter="pending";

/* PASSWORD STRENGTH */
document.getElementById("password").addEventListener("input",(e)=>{
    let val=e.target.value;
    let bar=document.getElementById("strengthBar");

    if(val.length<4){bar.style.width="30%";bar.style.background="red";}
    else if(val.length<6){bar.style.width="60%";bar.style.background="orange";}
    else{bar.style.width="100%";bar.style.background="green";}
});

/* SWITCH */
window.goSignup=()=>{loginPage.style.display="none";signupPage.style.display="flex";}
window.goLogin=()=>{signupPage.style.display="none";loginPage.style.display="flex";}

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
    if(user){
        if(!user.emailVerified){
            alert("Please verify email first");
            signOut(auth);
            return;
        }

        currentUser=user;
        loginPage.style.display="none";
        signupPage.style.display="none";
        app.style.display="block";

        let userDoc=await getDoc(doc(db,"users",user.uid));
        document.getElementById("userEmail").innerText="👤 "+(userDoc.data()?.name||user.email);

        loadTasks();
    }else{
        loginPage.style.display="flex";
        app.style.display="none";
    }
});

/* SIGNUP */
window.signup=async()=>{
    let name=name.value;
    let email=email.value;
    let pass=password.value;

    if(pass.length<6){
        return document.getElementById("passError").innerText="Password must be 6+ chars";
    }

    try{
        let user=await createUserWithEmailAndPassword(auth,email,pass);
        await sendEmailVerification(user.user);

        await setDoc(doc(db,"users",user.user.uid),{
            name:name,
            gender:gender.value,
            dob:dob.value,
            email:email
        });

        document.getElementById("signupSuccess").innerText="Verification email sent!";
    }catch(e){
        document.getElementById("emailError").innerText=e.message;
    }
}

/* LOGIN */
window.login=async()=>{
    try{
        await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
    }catch(e){
        document.getElementById("loginPassError").innerText=e.message;
    }
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* LOAD */
function loadTasks(){
    onSnapshot(collection(db,"tasks"),snap=>{
        allTasks=[];
        snap.forEach(d=>{
            let t=d.data();
            if(t.user===currentUser.uid) allTasks.push({id:d.id,...t});
        });

        notifyDueTasks(allTasks);
        render(allTasks);
    });
}

/* NOTIFICATION */
function notifyDueTasks(tasks){
    let today=new Date().toISOString().split("T")[0];
    tasks.forEach(t=>{
        if(t.date<today && !t.completed){
            console.log("⚠ Due Task:",t.text);
        }
    });
}

/* ADD */
window.add=async()=>{
    await addDoc(collection(db,"tasks"),{
        text:taskInput.value,
        date:date.value,
        priority:priority.value,
        completed:false,
        user:currentUser.uid
    });
}

/* FILTER */
window.switchFilter=(f)=>{currentFilter=f;render(allTasks);}

/* TOGGLE */
window.toggle=(id,c)=>updateDoc(doc(db,"tasks",id),{completed:!c});

/* DELETE */
window.del=(id)=>deleteDoc(doc(db,"tasks",id));

/* RENDER */
function render(tasks){
    let today=new Date().toISOString().split("T")[0];

    if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
    if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
    if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

    tasks.sort((a,b)=>new Date(a.date)-new Date(b.date));

    let html="";
    tasks.forEach(t=>{
        html+=`
        <div class="card">
            <div class="task ${t.completed?'completed':''}">
                <span class="${t.priority}">${t.text}</span>
                <div>
                    <button onclick="toggle('${t.id}',${t.completed})">✔</button>
                    <button onclick="del('${t.id}')">❌</button>
                </div>
            </div>
            <small>${t.date}</small>
        </div>`;
    });

    grid.innerHTML=html;
}

</script>

</body>
</html>
