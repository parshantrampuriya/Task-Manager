<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Task Manager</title>

<link rel="icon" href="data:,">

<style>
body{
margin:0;
font-family:"Segoe Print",cursive;
color:#e6f7ff;
background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),url("mahadev.png") no-repeat center/cover;
}

/* MENU */
.menu-btn{
position:fixed;
top:10px;
right:10px;
background:#ff9f2f;
padding:10px;
cursor:pointer;
}

.menu{
position:fixed;
right:-250px;
top:0;
width:250px;
height:100%;
background:#001f2f;
padding:20px;
transition:0.3s;
}

.menu.open{right:0;}

.menu div{
margin:10px 0;
cursor:pointer;
}

/* PAGE */
.page{display:none;}
.active{display:block;}

.center{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
}

input,select{
padding:10px;
width:250px;
background:#012;
border:1px solid #00cfff;
color:white;
}

button{
padding:10px;
background:#ff9f2f;
border:none;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{background:#012;padding:10px;}

.completed{text-decoration:line-through;}

.stats{
text-align:center;
background:#012;
padding:10px;
margin:10px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="menu" class="menu">
<div onclick="showPage('app')">🏠 Home</div>
<div onclick="showPage('profile')">👤 Profile</div>
<div onclick="showPage('leaderboard')">🏆 Leaderboard</div>
<div onclick="showPage('learning')">📚 Learning</div>
<div onclick="logout()">🚪 Logout</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page active center">
<h2>Login</h2>
<input id="loginEmail">
<input id="loginPassword" type="password">
<button onclick="login()">Login</button>
<button onclick="showPage('signupPage')">Signup</button>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="page center">
<input id="name" placeholder="Name">
<input id="email">
<input id="password" type="password">
<button onclick="signup()">Create</button>
<button onclick="showPage('loginPage')">Back</button>
</div>

<!-- APP -->
<div id="app" class="page">

<div class="stats" id="statsBox"></div>

<input id="taskInput">
<input type="date" id="dateInput">
<button onclick="add()">Add</button>

<div id="grid" class="grid"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page center">
<h2>Profile</h2>
<div id="profileData"></div>
<button onclick="showPage('app')">Back</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="page center">
<h2>Leaderboard</h2>
<div id="leaderData"></div>
<button onclick="showPage('app')">Back</button>
</div>

<!-- LEARNING -->
<div id="learning" class="page center">
<h2>Learning Planner</h2>
<input id="subject" placeholder="Subject">
<input id="target" placeholder="Target">
<button onclick="addLearning()">Add</button>
<div id="learningData"></div>
<button onclick="showPage('app')">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
authDomain:"task-manager-c32bc.firebaseapp.com",
projectId:"task-manager-c32bc"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;
let tasks=[];

/* MENU */
window.toggleMenu=()=>{
document.getElementById("menu").classList.toggle("open");
}

/* PAGE SWITCH */
window.showPage=(id)=>{
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
toggleMenu();
}

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user){
currentUser=user;
showPage("app");
loadTasks();
loadProfile();
loadLeaderboard();
loadLearning();
}else{
showPage("loginPage");
}
});

/* LOGIN */
window.login=()=>{
signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
}

/* SIGNUP */
window.signup=async()=>{
let u=await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"users",u.user.uid),{name:name.value});
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* TASK */
function loadTasks(){
onSnapshot(collection(db,"tasks"),snap=>{
tasks=[];
snap.forEach(d=>{
let t=d.data();
if(t.user===currentUser.uid) tasks.push(t);
});
render();
});
}

window.add=async()=>{
await addDoc(collection(db,"tasks"),{
text:taskInput.value,
date:dateInput.value,
completed:false,
user:currentUser.uid
});
}

/* RENDER */
function render(){
let today=new Date().toISOString().split("T")[0];

let todayTasks=tasks.filter(t=>t.date===today);
let done=todayTasks.filter(t=>t.completed).length;

statsBox.innerText=`Today: ${done}/${todayTasks.length}`;

let html="";
tasks.forEach(t=>{
html+=`<div class="card">
<div class="${t.completed?'completed':''}">${t.text}</div>
<button onclick="toggle('${t.text}')">✔</button>
</div>`;
});
grid.innerHTML=html;
}

window.toggle=(text)=>{
tasks.forEach(async t=>{
if(t.text===text){
t.completed=!t.completed;
}
});
}

/* PROFILE */
async function loadProfile(){
let docSnap=await getDocs(collection(db,"users"));
docSnap.forEach(d=>{
if(d.id===currentUser.uid){
profileData.innerText=JSON.stringify(d.data());
}
});
}

/* LEADERBOARD */
async function loadLeaderboard(){
let snap=await getDocs(collection(db,"tasks"));
let count={};
snap.forEach(d=>{
let t=d.data();
if(t.completed){
count[t.user]=(count[t.user]||0)+1;
}
});
leaderData.innerText=JSON.stringify(count);
}

/* LEARNING */
window.addLearning=async()=>{
await addDoc(collection(db,"learning"),{
user:currentUser.uid,
subject:subject.value,
target:target.value
});
}

async function loadLearning(){
let snap=await getDocs(collection(db,"learning"));
let html="";
snap.forEach(d=>{
let t=d.data();
if(t.user===currentUser.uid){
html+=`<div>${t.subject} - ${t.target}</div>`;
}
});
learningData.innerHTML=html;
}

</script>

</body>
</html>
