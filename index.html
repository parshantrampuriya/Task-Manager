<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>
body {
    margin: 0;
    font-family: "Segoe Print", cursive;
    color: #e6f7ff;
    background: linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
                url("mahadev.png") no-repeat center center fixed;
    background-size: cover;
}

.center {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

input, select {
    padding:10px;
    width:250px;
    background: rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

/* ERROR TEXT */
.error {
    color: #ff4d4d;
    font-size: 12px;
    height: 14px;
}

/* SUCCESS */
.success {
    color: #4dff88;
    font-size: 12px;
}

button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* PASSWORD STRENGTH */
.strength {
    height:5px;
    width:250px;
    background:#222;
}
.strength-bar {
    height:100%;
    width:0%;
}

/* APP */
.filter-bar {
    display:flex;
    justify-content:center;
    gap:10px;
}
.input-row {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
    flex-wrap:wrap;
}
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}
.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
}
.task {
    display:flex;
    justify-content:space-between;
}
.completed {
    text-decoration:line-through;
    opacity:0.6;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center" style="display:none">
    <h2>🔱 Sign In 🔱</h2>

    <input id="loginEmail" placeholder="Email">
    <div id="loginEmailError" class="error"></div>

    <input id="loginPassword" type="password" placeholder="Password">
    <div id="loginPassError" class="error"></div>

    <button id="loginBtn" onclick="login()">Sign In</button>

    <p onclick="goSignup()" style="cursor:pointer;color:#ff9f2f">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center" style="display:none">
    <h2>🔱 Create Account 🔱</h2>

    <input id="name" placeholder="Full Name">
    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>
    <input type="date" id="dob">

    <input id="email" placeholder="Email">
    <div id="emailError" class="error"></div>

    <input id="password" type="password" placeholder="Password">
    <div class="strength"><div id="strengthBar" class="strength-bar"></div></div>
    <div id="passError" class="error"></div>

    <button id="signupBtn" onclick="signup()">Create Account</button>
    <div id="signupSuccess" class="success"></div>

    <p onclick="goLogin()" style="cursor:pointer;color:#ff9f2f">Back to Sign In</p>
</div>

<!-- APP -->
<div id="app" style="display:none">
<h2 id="userEmail"></h2>
<button onclick="logout()">Logout</button>

<div class="filter-bar">
    <button onclick="switchFilter('pending')">Pending</button>
    <button onclick="switchFilter('completed')">Completed</button>
    <button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
    <input id="taskInput" placeholder="Enter mission...">
    <select id="category">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="Future">Future</option>
    </select>
    <input type="date" id="date">
    <button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.onload = ()=>{

const loginPage = document.getElementById("loginPage");
const signupPage = document.getElementById("signupPage");
const appPage = document.getElementById("app");

const loginEmail = document.getElementById("loginEmail");
const loginPassword = document.getElementById("loginPassword");

const email = document.getElementById("email");
const password = document.getElementById("password");

const strengthBar = document.getElementById("strengthBar");

/* PASSWORD STRENGTH */
password.addEventListener("input", ()=>{
    let val = password.value;
    let strength = val.length;

    if(strength < 4){
        strengthBar.style.width="25%";
        strengthBar.style.background="red";
    }else if(strength < 6){
        strengthBar.style.width="50%";
        strengthBar.style.background="orange";
    }else{
        strengthBar.style.width="100%";
        strengthBar.style.background="green";
    }
});

/* SWITCH */
window.goSignup=()=>{loginPage.style.display="none";signupPage.style.display="flex";}
window.goLogin=()=>{signupPage.style.display="none";loginPage.style.display="flex";}

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
    if(user){
        loginPage.style.display="none";
        signupPage.style.display="none";
        appPage.style.display="block";

        let userDoc=await getDoc(doc(db,"users",user.uid));
        document.getElementById("userEmail").innerText="👤 "+(userDoc.data()?.name||user.email);

        loadTasks();
    }else{
        loginPage.style.display="flex";
        appPage.style.display="none";
    }
});

/* SIGNUP */
window.signup=async()=>{
    document.getElementById("passError").innerText="";
    document.getElementById("emailError").innerText="";

    if(password.value.length < 6){
        return document.getElementById("passError").innerText="Password must be 6+ characters";
    }

    try{
        let userCred = await createUserWithEmailAndPassword(auth,email.value,password.value);

        await sendEmailVerification(userCred.user);

        document.getElementById("signupSuccess").innerText="Verification email sent!";

    }catch(e){
        document.getElementById("emailError").innerText=e.message;
    }
}

/* LOGIN */
window.login=async()=>{
    document.getElementById("loginPassError").innerText="";

    try{
        await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
    }catch(e){
        document.getElementById("loginPassError").innerText=e.message;
    }
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* TASKS (same as before) */
function loadTasks(){
    onSnapshot(collection(db,"tasks"),snap=>{
        let tasks=[];
        snap.forEach(d=>tasks.push({id:d.id,...d.data()}));
        render(tasks);
    });
}

window.add=async()=>{
    await addDoc(collection(db,"tasks"),{
        text:taskInput.value,
        date:date.value,
        completed:false
    });
}

window.toggle=(id,c)=>updateDoc(doc(db,"tasks",id),{completed:!c});
window.del=(id)=>deleteDoc(doc(db,"tasks",id));

function render(tasks){
    let html="";
    tasks.forEach(t=>{
        html+=`<div class="card">
        <div class="task ${t.completed?'completed':''}">
        ${t.text}
        <button onclick="toggle('${t.id}',${t.completed})">✔</button>
        </div></div>`;
    });
    grid.innerHTML=html;
}

}
</script>

</body>
</html>
