<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapasya System</title>

<style>
body {
    margin: 0;
    font-family: "Segoe Print", cursive;
    color: #e6f7ff;
    background: linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
                url("mahadev.png") no-repeat center center fixed;
    background-size: cover;
}

h1 {
    text-align: center;
    padding: 15px;
    color: #00cfff;
    text-shadow: 0 0 10px #00cfff, 0 0 10px #ff9f2f;
}

/* USER TABS */
.tabs {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.tab {
    padding: 10px 20px;
    cursor: pointer;
    color: #88cfff;
}

.tab.active {
    color: #ff9f2f;
    border-bottom: 2px solid #ff9f2f;
}

/* INPUT */
.input-box {
    display: flex;
    gap: 10px;
    margin: 20px;
}

input, select {
    flex: 1;
    padding: 10px;
    background: rgba(0,20,40,0.7);
    border: 1px solid #00cfff;
    color: white;
    border-radius: 6px;
}

button {
    background: linear-gradient(45deg, #ff9f2f, #e07b12);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(0,20,40,0.7);
    padding: 15px;
    border-radius: 12px;
}

/* TASK */
.task {
    background: rgba(0,0,0,0.5);
    margin: 8px 0;
    padding: 8px;
    display: flex;
    justify-content: space-between;
    border-radius: 6px;
}

.completed {
    text-decoration: line-through;
    opacity: 0.5;
}

.divider {
    border-top: 1px dashed #00cfff33;
    margin: 10px 0;
}
</style>
</head>

<body>

<h1>🔱 TAPASYA SYSTEM 🔱</h1>

<!-- USER SWITCH -->
<div class="tabs">
    <div id="Parshant" class="tab active" onclick="switchUser('Parshant')">Parshant</div>
    <div id="Tanu" class="tab" onclick="switchUser('Tanu')">Tanu</div>
</div>

<!-- INPUT -->
<div class="input-box">
    <input id="taskInput" placeholder="Enter mission...">
    <select id="category">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="Future">Future</option>
    </select>
    <input type="date" id="date" disabled>
    <button onclick="add()">Add</button>
</div>

<!-- GRID (IMPORTANT) -->
<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc",
  storageBucket: "task-manager-c32bc.firebasestorage.app",
  messagingSenderId: "686414095912",
  appId: "1:686414095912:web:158882cd292ccbaaccb71d",
  measurementId: "G-TLD8JJGETS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tasksRef = collection(db, "tasks");

let currentUser = "Parshant";
let allTasks = [];

/* SWITCH USER */
window.switchUser = function(user){
    currentUser = user;

    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(user).classList.add('active');

    render(allTasks);
}

/* CATEGORY DATE CONTROL */
document.getElementById("category").addEventListener("change", function(){
    let d=document.getElementById("date");
    if(this.value==="Future") d.disabled=false;
    else {d.disabled=true; d.value="";}
});

/* ADD TASK */
window.add = async function(){
    let t=document.getElementById("taskInput").value;
    let c=document.getElementById("category").value;
    let d=document.getElementById("date").value;

    if(!t) return alert("Enter task");

    let today=new Date();

    if(c==="Today") d=today.toISOString().split("T")[0];
    else if(c==="Tomorrow"){
        today.setDate(today.getDate()+1);
        d=today.toISOString().split("T")[0];
    }
    else if(!d) return alert("Select date");

    await addDoc(tasksRef, {
        text: t,
        date: d,
        completed: false,
        user: currentUser
    });

    document.getElementById("taskInput").value="";
}

/* REAL TIME */
onSnapshot(tasksRef, (snapshot)=>{
    allTasks = [];
    snapshot.forEach(docu=>{
        allTasks.push({id: docu.id, ...docu.data()});
    });
    render(allTasks);
});

/* TOGGLE */
window.toggle = async function(id, current){
    await updateDoc(doc(db,"tasks",id), {
        completed: !current
    });
}

/* DELETE */
window.del = async function(id){
    await deleteDoc(doc(db,"tasks",id));
}

/* RENDER */
function render(tasks){

    tasks = tasks.filter(t => t.user === currentUser);

    let grouped = {};

    tasks.forEach(t=>{
        if(!grouped[t.date]) grouped[t.date]=[];
        grouped[t.date].push(t);
    });

    let html="";

    for(let date in grouped){

        let pending = grouped[date].filter(t=>!t.completed);
        let completed = grouped[date].filter(t=>t.completed);

        html += `<div class="card"><h3>${formatDate(date)}</h3>`;

        pending.forEach(task=>{
            html += `
            <div class="task">
                ${task.text}
                <div>
                    <button onclick="toggle('${task.id}', ${task.completed})">✔</button>
                    <button onclick="del('${task.id}')">❌</button>
                </div>
            </div>`;
        });

        if(pending.length && completed.length){
            html += `<div class="divider"></div>`;
        }

        completed.forEach(task=>{
            html += `
            <div class="task completed">
                ${task.text}
                <div>
                    <button onclick="toggle('${task.id}', ${task.completed})">✔</button>
                    <button onclick="del('${task.id}')">❌</button>
                </div>
            </div>`;
        });

        html += `</div>`;
    }

    document.getElementById("grid").innerHTML = html;
}

/* DATE FORMAT */
function formatDate(dateStr){
    let today = new Date();
    let tomorrow = new Date();
    tomorrow.setDate(today.getDate()+1);

    let t = today.toISOString().split("T")[0];
    let tm = tomorrow.toISOString().split("T")[0];

    if(dateStr === t) return "Today";
    if(dateStr === tm) return "Tomorrow";

    return new Date(dateStr).toDateString();
}

</script>

</body>
</html>
