<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<link rel="icon" href="data:,">

<style>
body {
    margin:0;
    font-family:"Segoe Print",cursive;
    color:#e6f7ff;
    background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
    url("mahadev.png") no-repeat center center fixed;
    background-size:cover;
}

.center {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

input,select {
    padding:10px;
    width:250px;
    background:rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

button {
    padding:10px;
    background:#ff9f2f;
    border:none;
    color:white;
    cursor:pointer;
}

.filter-bar {
    display:flex;
    justify-content:center;
    gap:10px;
}

.input-row {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
    flex-wrap:wrap;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
    border-radius:10px;
}

.task {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.completed {
    text-decoration:line-through;
    opacity:0.6;
}

/* PRIORITY COLORS */
.high { border-left:5px solid red; }
.medium { border-left:5px solid orange; }
.low { border-left:5px solid green; }

/* PROGRESS BAR */
.progress {
    width:80%;
    height:10px;
    background:#333;
    margin:10px auto;
}
.progress-bar {
    height:100%;
    background:#00ffcc;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
    <h2>🔱 Sign In 🔱</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Sign In</button>
    <button onclick="resendVerification()">Resend Verification Email</button>
    <p onclick="goSignup()" style="cursor:pointer;color:#ff9f2f">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center" style="display:none">
    <h2>🔱 Create Account 🔱</h2>
    <input id="name" placeholder="Full Name">
    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>
    <input type="date" id="dob">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
    <div id="signupMessage"></div>
    <p onclick="goLogin()" style="cursor:pointer;color:#ff9f2f">Back to Sign In</p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h2 id="userEmail"></h2>
<button onclick="logout()">Logout</button>

<!-- SEARCH -->
<input id="search" placeholder="Search task..." oninput="render(allTasks)">
<button onclick="render(allTasks)">Search</button>

<!-- PROGRESS -->
<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<div class="filter-bar">
    <button onclick="switchFilter('pending')">Pending</button>
    <button onclick="switchFilter('completed')">Completed</button>
    <button onclick="switchFilter('due')">Due</button>
</div>

<div class="input-row">
    <input id="taskInput" placeholder="Enter mission...">

    <select id="category">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="Future">Future</option>
    </select>

    <input type="date" id="dateInput">

    <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

let currentUser=null;
let allTasks=[];
let currentFilter="pending";

window.goSignup=()=>{loginPage.style.display="none";signupPage.style.display="flex";}
window.goLogin=()=>{signupPage.style.display="none";loginPage.style.display="flex";}

onAuthStateChanged(auth, async(user)=>{
    if(user){
        currentUser=user;
        loginPage.style.display="none";
        signupPage.style.display="none";
        app.style.display="block";

        let userDoc=await getDoc(doc(db,"users",user.uid));
        userEmail.innerText="👤 "+(userDoc.data()?.name||user.email);

        loadTasks();
    }else{
        loginPage.style.display="flex";
        app.style.display="none";
    }
});

/* SIGNUP */
window.signup=async()=>{
    let user=await createUserWithEmailAndPassword(auth,email.value,password.value);
    await sendEmailVerification(user.user);

    await setDoc(doc(db,"users",user.user.uid),{
        name:name.value,
        gender:gender.value,
        dob:dob.value,
        email:email.value
    });

    signupMessage.innerText="📧 We sent a verification email. Check Gmail.";
}

/* LOGIN */
window.login=async()=>{
    await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* LOAD */
function loadTasks(){
    onSnapshot(collection(db,"tasks"),snap=>{
        allTasks=[];
        snap.forEach(d=>{
            let t=d.data();
            if(t.user===currentUser.uid){
                allTasks.push({id:d.id,...t});
            }
        });
        render(allTasks);
    });
}

/* ADD */
window.add=async()=>{
    let textVal = taskInput.value;
    let dateVal = dateInput.value;
    let catVal = category.value;
    let priorityVal = priority.value;

    let today=new Date();

    if(catVal==="Today"){
        dateVal = today.toISOString().split("T")[0];
    }
    else if(catVal==="Tomorrow"){
        today.setDate(today.getDate()+1);
        dateVal = today.toISOString().split("T")[0];
    }

    if(!textVal || !dateVal) return alert("Fill all");

    await addDoc(collection(db,"tasks"),{
        text:textVal,
        date:dateVal,
        completed:false,
        user:currentUser.uid,
        priority:priorityVal
    });

    taskInput.value="";
}

/* FILTER */
window.switchFilter=(f)=>{currentFilter=f;render(allTasks);}

/* TOGGLE */
window.toggle=(id,c)=>updateDoc(doc(db,"tasks",id),{completed:!c});

/* DELETE */
window.del=(id)=>deleteDoc(doc(db,"tasks",id));

/* EDIT */
window.editTask=(id,text)=>{
    let newText=prompt("Edit Task",text);
    if(newText){
        updateDoc(doc(db,"tasks",id),{text:newText});
    }
}

/* RENDER */
function render(tasks){

    let searchVal = document.getElementById("search").value.toLowerCase().trim();

    if(searchVal){
        tasks = tasks.filter(t => t.text.toLowerCase().includes(searchVal));
    }

    let today=new Date().toISOString().split("T")[0];

    if(currentFilter==="pending") tasks=tasks.filter(t=>!t.completed && t.date>=today);
    if(currentFilter==="completed") tasks=tasks.filter(t=>t.completed);
    if(currentFilter==="due") tasks=tasks.filter(t=>!t.completed && t.date<today);

    let completedCount = tasks.filter(t=>t.completed).length;
    let percent = tasks.length ? (completedCount/tasks.length)*100 : 0;
    document.getElementById("progressBar").style.width = percent+"%";

    tasks.sort((a,b)=>new Date(a.date)-new Date(b.date));

    let html="";

    if(tasks.length === 0){
        html = `<div style="text-align:center;width:100%">❌ No tasks found</div>`;
    }

    tasks.forEach(t=>{
        html+=`
        <div class="card ${t.priority}">
            <div class="task ${t.completed?'completed':''}">
                ${t.text}
                <div>
                    <button onclick="toggle('${t.id}',${t.completed})">✔</button>
                    <button onclick="editTask('${t.id}','${t.text}')">✏️</button>
                    <button onclick="del('${t.id}')">❌</button>
                </div>
            </div>
            <small>${t.date}</small>
        </div>`;
    });

    grid.innerHTML=html;
}

</script>

</body>
</html>
