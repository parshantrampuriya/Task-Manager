<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<link rel="icon" href="data:,">

<style>
body {
    margin:0;
    font-family:"Segoe Print",cursive;
    color:#e6f7ff;
    background:linear-gradient(rgba(0,10,20,0.92), rgba(0,10,20,0.97)),
    url("mahadev.png") no-repeat center center fixed;
    background-size:cover;
    transition:0.3s;
}

.light{
    background:white;
    color:black;
}

/* INPUT */
input,select {
    padding:10px;
    width:250px;
    background:rgba(0,20,40,0.7);
    border:1px solid #00cfff;
    color:white;
}

.light input,.light select{
    background:white;
    color:black;
}

.error{
    color:#ff4d4d;
    font-size:12px;
    height:14px;
}

.strength{
    font-size:12px;
}

/* CENTER */
.center {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:8px;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    right:-260px;
    top:0;
    width:250px;
    height:100%;
    background:#001f3f;
    padding:20px;
    transition:0.3s;
}
.sidebar.open{right:0;}

.sidebar button{
    width:100%;
    margin:10px 0;
}

/* TASK UI (UNCHANGED) */
.stats-box {
    text-align:center;
    background:rgba(0,20,40,0.7);
    padding:10px;
    margin:10px auto;
    width:60%;
    border-radius:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:rgba(0,20,40,0.7);
    padding:10px;
    border-radius:10px;
}

.completed { text-decoration:line-through; }
.high { border-left:5px solid red; }
.medium { border-left:5px solid orange; }
.low { border-left:5px solid green; }

.progress {
    width:80%;
    height:10px;
    background:#333;
    margin:10px auto;
}
.progress-bar {
    height:100%;
    background:#00ffcc;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<h2>🔱 Sign In 🔱</h2>

<input id="loginEmail" placeholder="Enter Email">
<div id="loginEmailError" class="error"></div>

<input id="loginPassword" type="password" placeholder="Enter Password">
<div id="loginPasswordError" class="error"></div>

<button onclick="login()">Sign In</button>
<p onclick="resetPassword()" style="cursor:pointer">Forgot Password?</p>
<p onclick="goSignup()">Create Account</p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center" style="display:none">
<h2>🔱 Create Account 🔱</h2>

<input id="name" placeholder="Full Name">
<div id="nameError" class="error"></div>

<select id="gender"><option>Male</option><option>Female</option></select>

<input type="date" id="dob">

<input id="email" placeholder="Enter Email">
<div id="emailError" class="error"></div>

<input id="password" type="password" placeholder="Enter Password" oninput="checkStrength()">
<div id="passwordStrength" class="strength"></div>
<div id="passwordError" class="error"></div>

<button onclick="signup()">Create Account</button>
<p onclick="goLogin()">Back</p>
</div>

<!-- APP (UNCHANGED FEATURES KEPT) -->
<div id="app" style="display:none">

<div class="topbar">
<span onclick="toggleMenu()">☰</span>
<span onclick="openProfile()">👤</span>
<span onclick="toggleTheme()">🌓</span>
</div>

<h2 id="userEmail"></h2>

<div id="statsBox" class="stats-box"></div>

<input id="search" placeholder="Search..." oninput="render(window.allTasks)">
<button onclick="render(window.allTasks)">Search</button>

<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<div class="input-row">
<input id="taskInput" placeholder="Enter Task">
<input type="date" id="dateInput">

<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button onclick="add()">Add</button>
</div>

<div class="grid" id="grid"></div>

</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<button onclick="showHome()">🏠 Home</button>
<button onclick="openProfile()">👤 Profile</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<!-- PROFILE -->
<div id="profilePage" class="center" style="display:none">
<h2>Profile</h2>
<p id="pName"></p>
<p id="pGender"></p>
<p id="pDob"></p>
<p id="pEmail"></p>
<button onclick="showHome()">Home</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendEmailVerification, sendPasswordResetEmail } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qZmQSv7tJXmVQiGRJD6xO8MKQvGGQ6o",
  authDomain: "task-manager-c32bc.firebaseapp.com",
  projectId: "task-manager-c32bc"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

let currentUser=null;
let allTasks=[];
window.allTasks=[];
let currentFilter="pending";

/* NAV */
window.goSignup=()=>{loginPage.style.display="none";signupPage.style.display="flex";}
window.goLogin=()=>{signupPage.style.display="none";loginPage.style.display="flex";}

/* ERRORS */
function clearErrors(){
document.querySelectorAll(".error").forEach(e=>e.innerText="");
}

/* PASSWORD STRENGTH */
window.checkStrength=()=>{
let p=password.value;
if(p.length<6) passwordStrength.innerText="Weak";
else if(p.length<10) passwordStrength.innerText="Medium";
else passwordStrength.innerText="Strong";
}

/* SIGNUP */
window.signup=async()=>{
clearErrors();

if(!name.value) nameError.innerText="Enter name";
if(!email.value) emailError.innerText="Enter email";
if(password.value.length<6) passwordError.innerText="Password too short";

if(!name.value || !email.value || password.value.length<6) return;

try{
let user=await createUserWithEmailAndPassword(auth,email.value,password.value);

await sendEmailVerification(user.user);

await setDoc(doc(db,"users",user.user.uid),{
name:name.value, gender:gender.value, dob:dob.value, email:email.value
});

alert("Account Created! Verify your email");

}catch(e){
if(e.code==="auth/email-already-in-use") emailError.innerText="Email already exists";
if(e.code==="auth/weak-password") passwordError.innerText="Weak password";
}
}

/* LOGIN */
window.login=async()=>{
clearErrors();

if(!loginEmail.value) loginEmailError.innerText="Enter email";
if(!loginPassword.value) loginPasswordError.innerText="Enter password";

if(!loginEmail.value || !loginPassword.value) return;

try{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
}catch(e){
if(e.code==="auth/invalid-credential") loginPasswordError.innerText="Wrong credentials";
if(e.code==="auth/too-many-requests") loginPasswordError.innerText="Too many attempts";
}
}

/* RESET PASSWORD */
window.resetPassword=()=>{
if(!loginEmail.value){
loginEmailError.innerText="Enter email first";
return;
}
sendPasswordResetEmail(auth,loginEmail.value);
alert("Reset link sent");
}

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
if(user){
currentUser=user;
loginPage.style.display="none";
signupPage.style.display="none";
app.style.display="block";

let userDoc=await getDoc(doc(db,"users",user.uid));
let d=userDoc.data();

userEmail.innerText="👤 "+d.name;

pName.innerText="Name: "+d.name;
pGender.innerText="Gender: "+d.gender;
pDob.innerText="DOB: "+d.dob;
pEmail.innerText="Email: "+d.email;

loadTasks();
}
});

/* LOGOUT */
window.logout=()=>signOut(auth);

/* TASKS (UNCHANGED CORE) */
function loadTasks(){
onSnapshot(collection(db,"tasks"),snap=>{
allTasks=[];
snap.forEach(d=>{
let t=d.data();
if(t.user===currentUser.uid){
allTasks.push({id:d.id,...t});
}
});
window.allTasks=allTasks;
render(allTasks);
});
}

window.add=async()=>{
await addDoc(collection(db,"tasks"),{
text:taskInput.value,
date:dateInput.value,
completed:false,
user:currentUser.uid,
priority:priority.value
});
}

/* RENDER */
window.render=function(tasks){
let html="";
tasks.forEach(t=>{
html+=`
<div class="card ${t.priority}">
<div class="task ${t.completed?'completed':''}">
${t.text}
</div>
</div>`;
});
grid.innerHTML=html;
}

/* MENU */
window.toggleMenu=()=>sidebar.classList.toggle("open");

/* PROFILE */
window.openProfile=()=>{
app.style.display="none";
profilePage.style.display="flex";
}

window.showHome=()=>{
profilePage.style.display="none";
app.style.display="block";
}

/* THEME */
window.toggleTheme=()=>{
document.body.classList.toggle("light");
}

</script>

</body>
</html>
