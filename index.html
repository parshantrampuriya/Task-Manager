<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="container">

    <div class="login-box">
        <h2>🔐 Welcome Back</h2>
        <p class="subtitle">Sign in to continue your journey</p>

        <!-- EMAIL -->
        <label>Email</label>
        <input id="email" type="email" placeholder="Enter Email">

        <!-- PASSWORD -->
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter Password">

        <!-- FORGOT PASSWORD -->
        <div class="forgot">
            <span id="forgotBtn">Forgot Password?</span>
        </div>

        <!-- BUTTON -->
        <button id="loginBtn">Sign In</button>

        <!-- SIGNUP -->
        <p>Don't have an account?</p>
        <span class="link" id="goSignupBtn">Create Account</span>
    </div>

</div>

<!-- FORGOT PASSWORD POPUP -->
<div id="forgotPopup" class="popup" style="display:none;">
    <div class="popup-box">
        <h3>Reset Password</h3>

        <input id="resetEmail" type="email" placeholder="Enter your email">

        <button id="resetBtn">Get Reset Link</button>

        <span id="closePopup" class="close">✖</span>
    </div>
</div>

<!-- IMPORTANT: MODULE -->
<script type="module" src="js/login.js"></script>

</body>
</html>
