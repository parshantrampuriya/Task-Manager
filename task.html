<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>

<link rel="stylesheet" href="css/home.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2 id="username">👤 Loading...</h2>

    <div class="menu">
        <button onclick="goHome()">🏠 Home</button>
        <button onclick="goTasks()">📋 Tasks</button>
        <button id="logoutBtn">🚪 Logout</button>
    </div>
</div>

<div class="container">

    <!-- SEARCH -->
    <input id="searchInput" placeholder="Search tasks...">

    <!-- TABS -->
    <div class="tabs">
        <button onclick="switchTab('pending')">📌 Pending</button>
        <button onclick="switchTab('due')">🔥 Due</button>
        <button onclick="switchTab('completed')">✅ Completed</button>
    </div>

    <!-- ADD -->
    <div class="add-task">
        <input id="taskInput" placeholder="New task...">
        <input type="date" id="dateInput">
        <button onclick="addTask()">Add</button>
    </div>

    <!-- TASK LIST -->
    <div id="taskContainer"></div>

</div>

<script type="module" src="js/tasks.js"></script>

</body>
</html>
