<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>

<link rel="stylesheet" href="css/tasks.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h2 id="username">👤 Loading...</h2>
    </div>

    <!-- CONTENT -->
    <div class="container">

        <!-- TOP BAR -->
        <div class="top-bar">

            <input id="searchInput" placeholder="🔍 Search tasks...">

            <div class="tabs">
                <button onclick="switchTab('pending')">📌</button>
                <button onclick="switchTab('due')">🔥</button>
                <button onclick="switchTab('completed')">✅</button>
            </div>

        </div>

        <!-- ADD TASK -->
        <div class="add-task">
            <input id="taskInput" placeholder="New task...">
            <input type="date" id="dateInput">
            <button onclick="addTask()">Add</button>
        </div>

        <!-- TASK LIST -->
        <div id="taskContainer"></div>

    </div>

</div>

<script type="module" src="js/tasks.js"></script>

</body>
</html>
