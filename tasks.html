<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Tasks</title>

<link rel="stylesheet" href="css/tasks.css">
<link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>

<button onclick="goTasks()">📋 Tasks</button>

<button onclick="goGoals()">🎯 Goals</button>

<button onclick="goFriends()">👥 Friends</button>

<button onclick="goQuestionBank()">📚 Question Bank</button>

<button onclick="goTests()">📝 Tests</button>

<button onclick="goGrowth()">🌱 Growth Hub</button>

<button onclick="goProfile()">👤 Profile</button>

<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

<!-- ================= NAVBAR ================= -->
<div class="navbar">

<button class="menu-btn"
onclick="toggleSidebar()">

☰

</button>

<h2 id="username">
📋 Tasks Dashboard
</h2>

</div>

<!-- ================= CONTAINER ================= -->
<div class="container">

<!-- ================= STATS ================= -->
<div class="stats-grid">

<div class="stat-card critical">

<h3 id="criticalCount">0</h3>

<p>🔥 Critical</p>

</div>

<div class="stat-card important">

<h3 id="importantCount">0</h3>

<p>⭐ Important</p>

</div>

<div class="stat-card completed">

<h3 id="completedCount">0</h3>

<p>✅ Completed</p>

</div>

<div class="stat-card pending">

<h3 id="pendingCount">0</h3>

<p>📌 Pending</p>

</div>

</div>

<!-- ================= PRODUCTIVITY ================= -->
<div class="productivity-box">

<div class="productivity-head">

<span>
📈 Productivity Score
</span>

<!-- 🔥 FIXED ID -->
<span id="productivityText">
0%
</span>

</div>

<div class="progress-bar">

<div
class="progress-fill"
id="progressFill">

</div>

</div>

</div>

<!-- ================= SEARCH ================= -->
<input
id="searchInput"
placeholder="🔍 Search tasks...">

<!-- ================= TABS ================= -->
<div class="tabs">

<button
class="active"
onclick="switchTab('pending',event)">

📌 Pending

</button>

<button
onclick="switchTab('due',event)">

🔥 Due

</button>

<button
onclick="switchTab('completed',event)">

✅ Completed

</button>

</div>

<!-- ================= CLEAR BUTTON ================= -->
<div class="top-actions">

<button
class="clear-btn"
onclick="clearCompleted()">

🗑 Clear Completed

</button>

</div>

<!-- ================= ADD TASK ================= -->
<div class="add-task">

<input
id="taskInput"
placeholder="New task...">

<input
type="date"
id="dateInput">

<input
type="time"
id="timeInput">

<!-- ================= PRIORITY ================= -->
<div class="priority-box">

<label class="priority-option">

<!-- 🔥 FIXED IDS -->
<input
type="checkbox"
id="importantCheck">

<span>
⭐ Important
</span>

</label>

<label class="priority-option">

<input
type="checkbox"
id="urgentCheck">

<span>
🔥 Urgent
</span>

</label>

</div>

<button onclick="addTask()">

➕ Add

</button>

</div>

<!-- ================= QUADRANT FILTERS ================= -->
<div class="quadrant-info">

<button
class="quad-btn active q1"
onclick="setQuadrantFilter('all',event)">

📋 All

</button>

<button
class="quad-btn q1"
onclick="setQuadrantFilter('critical',event)">

🔥 Important + Urgent

</button>

<button
class="quad-btn q2"
onclick="setQuadrantFilter('important',event)">

⭐ Important

</button>

<button
class="quad-btn q3"
onclick="setQuadrantFilter('urgent',event)">

⚡ Urgent

</button>

<button
class="quad-btn q4"
onclick="setQuadrantFilter('normal',event)">

📦 Low Priority

</button>

</div>

<!-- ================= TASKS ================= -->
<div id="taskContainer">

</div>

</div>

</div>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal">

<div class="modal-box">

<h3 id="modalTitle">

Edit Task

</h3>

<input
id="modalInput"
placeholder="Task name">

<input
type="date"
id="modalDate">

<input
type="time"
id="modalTime">

<!-- ================= MODAL PRIORITY ================= -->
<div class="modal-priority">

<label>

<input
type="checkbox"
id="modalImportant">

⭐ Important

</label>

<label>

<input
type="checkbox"
id="modalUrgent">

🔥 Urgent

</label>

</div>

<div class="modal-actions">

<button onclick="confirmAction()">

💾 Save

</button>

<button onclick="closeModal()">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- ================= SCRIPTS ================= -->
<script
type="module"
src="js/menu.js">

</script>

<script
type="module"
src="js/tasks.js">

</script>

</body>
</html>
