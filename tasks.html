<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>

<link rel="stylesheet" href="css/tasks.css">
<link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

<!-- ================= UNIVERSAL SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

<h2>⚡ Menu</h2>

<button onclick="goHome()">🏠 Home</button>

<button onclick="goTasks()">📋 Tasks</button>

<button onclick="goGoals()">🎯 Goals</button>

<button onclick="goFriends()">👥 Friends</button>

<button onclick="goQuestionBank()">📚 Question Bank</button>

<button onclick="goTests()">📝 Tests</button>

<button onclick="goGrowth()">🌱 Growth Hub</button>

<button onclick="goProfile()">👤 Profile</button>

<button id="logoutBtn">🚪 Logout</button>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

<!-- NAVBAR -->
<div class="navbar">

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<h2 id="username">📋 Tasks</h2>

</div>

<div class="container">

<!-- SEARCH -->
<input id="searchInput" placeholder="🔍 Search tasks...">

<!-- TABS -->
<div class="tabs">

<button onclick="switchTab('pending',event)">
📌 Pending
</button>

<button onclick="switchTab('due',event)">
🔥 Due
</button>

<button onclick="switchTab('completed',event)">
✅ Completed
</button>

</div>

<!-- ADD TASK -->
<div class="add-task">

<input id="taskInput" placeholder="New task...">

<input type="date" id="dateInput">

<input type="time" id="timeInput">

<button onclick="addTask()">➕ Add</button>

</div>

<!-- TASK LIST -->
<div id="taskContainer"></div>

</div>

</div>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal">

<div class="modal-box">

<h3 id="modalTitle">Edit Task</h3>

<input id="modalInput" placeholder="Task name">

<input type="date" id="modalDate">

<input type="time" id="modalTime">

<div class="modal-actions">

<button onclick="confirmAction()">💾 Save</button>

<button onclick="closeModal()">❌ Cancel</button>

</div>

</div>

</div>

<script type="module" src="js/tasks.js"></script>
<script type="module" src="js/menu.js"></script>

</body>
</html>
