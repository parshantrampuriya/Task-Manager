<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>

<link rel="stylesheet" href="css/tasks.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <h2>⚡ Menu</h2>

    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goTasks()">📋 Tasks</button>
    <button onclick="goGoals()">🎯 Goals</button>
    <button onclick="goProfile()">👤 Profile</button>
    <button id="logoutBtn">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h2 id="username">👤 Loading...</h2>
    </div>

    <div class="container">

        <!-- SEARCH -->
        <input id="searchInput" placeholder="🔍 Search tasks...">

        <!-- TABS -->
        <div class="tabs">
            <button onclick="switchTab('pending')">📌 Pending</button>
            <button onclick="switchTab('due')">🔥 Due</button>
            <button onclick="switchTab('completed')">✅ Completed</button>
        </div>

        <!-- ADD TASK -->
        <div class="add-task">
            <input id="taskInput" placeholder="New task...">
            <input type="date" id="dateInput">

            <!-- 🔥 NEW TIME INPUT -->
            <input type="time" id="timeInput">

            <button onclick="addTask()">Add</button>
        </div>

        <!-- TASK LIST -->
        <div id="taskContainer"></div>

    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

    <div class="modal-box">

        <h3 id="modalTitle">Edit Task</h3>

        <input id="modalInput" placeholder="Enter task">

        <div class="modal-actions">
            <button onclick="confirmAction()">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>

    </div>

</div>

<script type="module" src="js/tasks.js"></script>

</body>
</html>
